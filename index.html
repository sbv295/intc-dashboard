<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTC Dashboard</title>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="be0b9ce8-f4bc-4d6f-94fe-b0bcce0b7518"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.6/dist/protobuf.min.js"></script>
    <style>
        :root {
            --bg: #0f0f14;
            --surface: #1a1a24;
            --surface2: #22222e;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text-dim: #888899;
            --green: #00c853;
            --red: #ff1744;
            --cyan: #00bcd4;
            --amber: #ffc107;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 img {
            height: 2.5em;
            vertical-align: middle;
        }

        .header .time-display {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: right;
            line-height: 1.6;
        }

        .status-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .badge-market { background: #1b3a1b; color: var(--green); }
        .badge-premarket, .badge-postmarket { background: #3a351b; color: var(--amber); }
        .badge-closed { background: #2a2a2a; color: #888; }

        /* ─── Price Cards ─────────────────────────────────────── */
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        @media (max-width: 900px) {
            .cards { grid-template-columns: 1fr; }
            .big-price { font-size: 3rem !important; }
            .card.focused { order: -1; }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            text-align: center;
            transition: all 0.4s ease;
        }

        .card.focused {
            transform: scale(1.02);
            border-width: 2px;
        }
        .card:not(.focused) {
            opacity: 0.5;
            transform: scale(0.97);
            filter: brightness(0.8);
        }

        .card-nasdaq.market { border-color: var(--green); box-shadow: 0 0 12px rgba(0,200,83,0.1); }
        .card-nasdaq.premarket, .card-nasdaq.postmarket { border-color: var(--amber); box-shadow: 0 0 8px rgba(255,193,7,0.1); }
        .card-nasdaq.closed { border-color: var(--border); }

        .card-hl {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-color: #0f3460;
        }

        .source-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .source-label .status-badge {
            margin-left: 8px;
            vertical-align: middle;
        }

        .big-price {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            margin: 4px 0;
            transition: color 0.3s;
        }

        .price-flash-up { animation: flashGreen 1.2s ease-out; }
        .price-flash-down { animation: flashRed 1.2s ease-out; }

        @keyframes flashGreen {
            0% { color: var(--green); text-shadow: 0 0 24px rgba(0,200,83,0.6); }
            50% { color: var(--green); text-shadow: 0 0 12px rgba(0,200,83,0.3); }
            100% { color: var(--text); text-shadow: none; }
        }
        @keyframes flashRed {
            0% { color: var(--red); text-shadow: 0 0 24px rgba(255,23,68,0.6); }
            50% { color: var(--red); text-shadow: 0 0 12px rgba(255,23,68,0.3); }
            100% { color: var(--text); text-shadow: none; }
        }

        .change { font-size: 1.1rem; font-weight: 600; margin: 4px 0; }
        .change.up { color: var(--green); }
        .change.down { color: var(--red); }
        .prev-close { font-size: 0.8rem; color: var(--text-dim); }

        .extended-price {
            font-size: 1.05rem;
            color: var(--text-dim);
            margin-top: 6px;
            line-height: 1.4;
        }
        .extended-price .ext-label {
            font-weight: 600;
            color: var(--amber);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .extended-price .ext-value {
            font-weight: 700;
            color: var(--text);
        }
        .extended-price .ext-change {
            font-weight: 600;
        }
        .extended-price .ext-change.up { color: var(--green); }
        .extended-price .ext-change.down { color: var(--red); }

        .dim-element { opacity: 0.3; transition: opacity 0.5s; }

        .market-cap {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .price-meta {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin: 6px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .price-meta .change { margin: 0; }
        .price-meta .prev-close { margin: 0; }

        .session-details {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
            line-height: 2;
            text-align: left;
        }
        .session-details b { color: var(--text); }

        .ath-info {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
            text-align: left;
            line-height: 2;
        }
        .ath-info b { color: var(--text); }
        .ath-info .ath-value { color: var(--amber); font-weight: 700; }
        .ath-info .ath-pct { font-weight: 600; }

        /* ─── Chart Section ───────────────────────────────────── */
        .chart-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .chart-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .chart-controls label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 2px;
            background: var(--bg);
            border-radius: 6px;
            padding: 2px;
        }

        .btn-group button {
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-group button.active {
            background: var(--surface2);
            color: var(--text);
        }

        .btn-group button:hover:not(.active) {
            color: var(--text);
        }

        .chart-tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 12px;
        }

        .chart-tabs button {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 20px;
            border-radius: 6px 6px 0 0;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chart-tabs button.active {
            background: var(--surface);
            color: var(--text);
            border-bottom-color: var(--surface);
        }

        #chart-container {
            width: 100%;
            height: 450px;
            border-radius: 8px;
            overflow: hidden;
        }

        .chart-legend {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-top: 8px;
            padding: 6px 12px;
            font-size: 0.7rem;
            color: var(--text-dim);
        }
        .chart-legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .chart-legend-swatch {
            width: 14px;
            height: 3px;
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            #chart-container { height: 320px; }
            body { padding: 8px; }
            .header h1 { font-size: 1.1rem; }
            .header h1 img { height: 1.5em; }
            .card { padding: 14px 16px; }
            .big-price { font-size: 2.5rem !important; }
            .chart-controls { gap: 6px; }
            .chart-controls label { font-size: 0.65rem; }
            .btn-group button { padding: 4px 8px; font-size: 0.65rem; }
            .source-label { font-size: 0.7rem; }
            .price-meta { font-size: 0.75rem; }
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
        }
        .nav-tabs a {
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 8px 8px 0 0;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom: none;
            transition: all 0.2s;
        }
        .nav-tabs a.active {
            color: var(--text);
            background: var(--bg);
            border-color: var(--text-dim);
        }
        .nav-tabs a:hover:not(.active) { color: var(--text); }
    </style>
</head>
<body>
    <div class="nav-tabs">
        <a href="index.html" class="active">INTC Dashboard</a>
        <a href="watchlist.html">Watchlist</a>
    </div>

    <!-- Header -->
    <div class="header">
        <div>
            <h1><img src="Intel_logo.png" alt="Intel">INTC — Intel Corporation</h1>
        </div>
        <div class="time-display" id="time-display">--</div>
    </div>

    <!-- Price Cards -->
    <div class="cards">
        <div class="card card-nasdaq closed" id="nasdaq-card">
            <div class="source-label">NASDAQ: INTC (Live) <span class="status-badge badge-closed" id="market-badge">Loading...</span></div>
            <div class="big-price" id="nasdaq-price">—</div>
            <div class="price-meta" id="nasdaq-meta"></div>
            <div class="extended-price" id="nasdaq-extended"></div>
            <div class="market-cap" id="nasdaq-mcap"></div>
            <div class="session-details" id="nasdaq-sessions"></div>
            <div class="ath-info" id="nasdaq-ath"></div>
        </div>
        <div class="card card-hl" id="hl-card">
            <div class="source-label">Hyperliquid 24/7 (xyz:INTC perp)</div>
            <div class="big-price" id="hl-price">—</div>
            <div class="price-meta" id="hl-meta"></div>
            <div class="session-details" id="hl-details"></div>
        </div>
    </div>

    <!-- Chart Section -->
    <div class="chart-section">
        <div class="chart-tabs">
            <button class="active" onclick="switchTab('nasdaq')">NASDAQ</button>
            <button onclick="switchTab('hl')">Hyperliquid</button>
        </div>
        <div class="chart-controls">
            <label>Type:</label>
            <div class="btn-group" id="chart-type-group">
                <button class="active" onclick="setChartType('line')">Line</button>
                <button onclick="setChartType('candles')">Candles</button>
            </div>
            <label>Range:</label>
            <div class="btn-group" id="range-group">
                <button class="active" onclick="setChartRange('1d')">1D</button>
                <button onclick="setChartRange('1mo')">1M</button>
                <button onclick="setChartRange('1y')">1Y</button>
                <button onclick="setChartRange('5y')">5Y</button>
                <button onclick="setChartRange('max')">All</button>
            </div>
            <label>Interval:</label>
            <div class="btn-group" id="interval-group">
                <button onclick="setChartInterval('1m')">1m</button>
                <button class="active" onclick="setChartInterval('5m')">5m</button>
                <button onclick="setChartInterval('15m')">15m</button>
                <button onclick="setChartInterval('30m')">30m</button>
                <button onclick="setChartInterval('1h')">1h</button>
                <button onclick="setChartInterval('1d')">1d</button>
                <button onclick="setChartInterval('1wk')">1wk</button>
            </div>
            <label>Timezone:</label>
            <div class="btn-group" id="tz-group">
                <button class="active" onclick="setChartTimezone('IST')">IST</button>
                <button onclick="setChartTimezone('ET')">ET</button>
            </div>
            <div class="btn-group" id="fit-group">
                <button id="btn-market-only" onclick="toggleMarketOnly()">Market Only</button>
            </div>
        </div>
        <div id="chart-container"></div>
        <div class="chart-legend" id="chart-legend">
            <div class="chart-legend-item"><span class="chart-legend-swatch" style="background:#00bcd4"></span> Regular Hours</div>
            <div class="chart-legend-item"><span class="chart-legend-swatch" style="background:#00bcd488"></span> Pre/Post Market</div>
            <div class="chart-legend-item"><span class="chart-legend-swatch" style="background:rgba(0,200,83,0.3); height:10px; width:10px; border-radius:2px"></span> Volume</div>
        </div>
    </div>

    <script>
    // ─── State ──────────────────────────────────────────────────────────────
    let currentTab = 'nasdaq';
    let chartType = 'line';
    let chartInterval = '5m';
    let chartRange = '1d';
    let chart = null;
    let mainSeries = null;
    let volumeSeries = null;
    let prevNasdaqPrice = null;
    let prevYahooPrice = null;
    let prevHlPrice = null;
    let nasdaqPrevClose = null;
    let INTC_SHARES = 5.026e9; // fallback, fetched on init
    let hlWs = null;
    let yahooWs = null;
    let hlReconnectTimer = null;
    let yahooReconnectTimer = null;
    let shouldFitContent = true;
    let chartDataCache = [];
    let chartTimezone = 'IST';
    let tradingPeriods = null; // from Yahoo API meta
    let marketOnlyView = false;

    // ─── Yahoo Finance API (client-side, replaces yfinance backend) ─────────
    const YAHOO_BASE = 'https://query1.finance.yahoo.com/v8/finance/chart/INTC';
    // Use our own Vercel proxy if available, fallback to allorigins
    let proxyMode = 'unknown'; // 'vercel' | 'direct' | 'allorigins'

    async function yahooFetch(url) {
        // If we know our mode, use it directly
        if (proxyMode === 'vercel') {
            return await fetchViaVercel(url);
        }
        if (proxyMode === 'direct') {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            return resp.json();
        }
        if (proxyMode === 'allorigins') {
            return await fetchViaAllorigins(url);
        }

        // First call — detect which mode works
        // Try our own /api/yahoo proxy (Vercel)
        try {
            const data = await fetchViaVercel(url);
            proxyMode = 'vercel';
            console.log('Using Vercel proxy');
            return data;
        } catch (e) {}

        // Try direct (localhost dev)
        try {
            const resp = await fetch(url);
            if (resp.ok) {
                proxyMode = 'direct';
                return resp.json();
            }
        } catch (e) {}

        // Fallback to allorigins
        try {
            const data = await fetchViaAllorigins(url);
            proxyMode = 'allorigins';
            console.log('Using allorigins proxy');
            return data;
        } catch (e) {}

        throw new Error('All data sources failed');
    }

    async function fetchViaVercel(url) {
        // Parse Yahoo URL params and route through our serverless function
        const params = new URL(url).searchParams;
        const apiUrl = '/api/yahoo?' + params.toString();
        const resp = await fetch(apiUrl);
        if (!resp.ok) throw new Error(`Vercel proxy HTTP ${resp.status}`);
        return resp.json();
    }

    async function fetchViaAllorigins(url) {
        const resp = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url));
        if (!resp.ok) throw new Error(`Allorigins HTTP ${resp.status}`);
        return resp.json();
    }

    async function fetchSharesOutstanding() {
        try {
            const url = 'https://query1.finance.yahoo.com/v10/finance/quoteSummary/INTC?modules=defaultKeyStatistics';
            const data = await yahooFetch(url);
            const shares = data?.quoteSummary?.result?.[0]?.defaultKeyStatistics?.sharesOutstanding?.raw;
            if (shares && shares > 0) {
                INTC_SHARES = shares;
            }
        } catch (e) {
            // Fallback value remains
        }
    }

    // ─── ATH (All Time High) ────────────────────────────────────────────────
    async function fetchATH() {
        try {
            const url = `${YAHOO_BASE}?interval=1mo&range=max`;
            const json = await yahooFetch(url);
            const result = json.chart.result[0];
            const quote = result.indicators.quote[0];

            let athClose = -Infinity, athHigh = -Infinity;
            let athCloseDate = null, athHighDate = null;
            const timestamps = result.timestamp || [];

            for (let i = 0; i < timestamps.length; i++) {
                const c = quote.close[i], h = quote.high[i];
                if (c != null && c > athClose) { athClose = c; athCloseDate = timestamps[i]; }
                if (h != null && h > athHigh) { athHigh = h; athHighDate = timestamps[i]; }
            }

            const athEl = document.getElementById('nasdaq-ath');
            if (athEl && athClose > 0) {
                const fmtDate = (ts) => new Date(ts * 1000).toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
                athEl.innerHTML =
                    `<b>ATH Close:</b> <span class="ath-value">$${athClose.toFixed(2)}</span> (${fmtDate(athCloseDate)})<br>` +
                    `<b>ATH Trade:</b> <span class="ath-value">$${athHigh.toFixed(2)}</span> (${fmtDate(athHighDate)})`;
            }
        } catch (e) {
            console.error('ATH fetch error:', e);
        }
    }

    // Interval → period mapping
    const INTERVAL_PERIODS = {
        '1m': '1d', '2m': '5d', '5m': '5d', '15m': '5d',
        '30m': '1mo', '60m': '6mo', '1h': '6mo',
        '1d': '5y', '1wk': 'max', '1mo': 'max'
    };

    // ─── Time Formatting ────────────────────────────────────────────────────
    function formatTimeET(date) {
        return date.toLocaleString('en-US', {
            timeZone: 'America/New_York',
            hour: 'numeric', minute: '2-digit', second: '2-digit',
            hour12: true
        }) + ' ET';
    }

    function formatTimeIST(date) {
        return date.toLocaleString('en-US', {
            timeZone: 'Asia/Kolkata',
            hour: 'numeric', minute: '2-digit', second: '2-digit',
            hour12: true
        }) + ' IST';
    }

    function formatDualTime(date) {
        return formatTimeIST(date) + '<br>' + formatTimeET(date);
    }

    function getMarketStatus() {
        const now = new Date();
        const etStr = now.toLocaleString('en-US', { timeZone: 'America/New_York', hour12: false });
        const etDate = new Date(etStr);
        const h = etDate.getHours();
        const m = etDate.getMinutes();
        const mins = h * 60 + m;
        const day = etDate.getDay(); // 0=Sun, 6=Sat

        if (day === 0 || day === 6) return { status: 'closed', label: 'Closed' };
        if (mins >= 240 && mins < 570) return { status: 'premarket', label: 'Pre-Market' };
        if (mins >= 570 && mins < 960) return { status: 'market', label: 'Market Open' };
        if (mins >= 960 && mins < 1200) return { status: 'postmarket', label: 'Post-Market' };
        return { status: 'closed', label: 'Closed' };
    }

    // ─── Chart Setup ────────────────────────────────────────────────────────
    // Colors for session types
    const CHART_COLORS = {
        regular: '#ff5252',
        extended: '#6b7a8a',  // grayish for pre/post market line
        hlLine: '#00e676',
        volUp: 'rgba(0,200,83,0.3)',
        volDown: 'rgba(255,23,68,0.3)',
        volExtUp: 'rgba(0,200,83,0.15)',
        volExtDown: 'rgba(255,23,68,0.15)',
        candleUp: '#00c853',
        candleDown: '#ff1744',
        candleExtUp: '#00c85388',   // muted green for ext hours up
        candleExtDown: '#ff174488', // muted red for ext hours down
    };

    function getChartTZ() {
        return chartTimezone === 'IST' ? 'Asia/Kolkata' : 'America/New_York';
    }

    function setChartTimezone(tz) {
        chartTimezone = tz;
        document.querySelectorAll('#tz-group button').forEach(b => {
            b.classList.toggle('active', b.textContent === tz);
        });
        updateChartTimeOptions();
    }

    function getTickFormatter() {
        return (time) => {
            const d = new Date(time * 1000);
            const tz = getChartTZ();
            if (chartRange === '1d' || chartRange === '5d') {
                return d.toLocaleString('en-US', { timeZone: tz, hour: 'numeric', minute: '2-digit', hour12: true });
            } else if (chartRange === '1mo') {
                return d.toLocaleString('en-US', { timeZone: tz, month: 'short', day: 'numeric' });
            } else if (chartRange === '1y') {
                return d.toLocaleString('en-US', { timeZone: tz, month: 'short', day: 'numeric', year: '2-digit' });
            } else {
                return d.toLocaleString('en-US', { timeZone: tz, month: 'short', year: 'numeric' });
            }
        };
    }

    function getCrosshairFormatter() {
        return (time) => {
            const d = new Date(time * 1000);
            const tz = getChartTZ();
            const label = chartTimezone === 'IST' ? 'IST' : 'ET';
            if (chartRange === '1d' || chartRange === '5d') {
                return d.toLocaleString('en-US', { timeZone: tz, hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true }) + ' ' + label;
            } else {
                return d.toLocaleString('en-US', { timeZone: tz, month: 'short', day: 'numeric', year: 'numeric' });
            }
        };
    }

    function createChart() {
        const container = document.getElementById('chart-container');
        container.innerHTML = '';

        chart = LightweightCharts.createChart(container, {
            width: container.clientWidth,
            height: container.clientHeight,
            layout: {
                background: { type: 'solid', color: '#1a1a24' },
                textColor: '#888899',
            },
            grid: {
                vertLines: { color: '#2a2a3a' },
                horzLines: { color: '#2a2a3a' },
            },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: {
                borderColor: '#2a2a3a',
                scaleMargins: { top: 0.05, bottom: 0.2 },
            },
            timeScale: {
                borderColor: '#2a2a3a',
                timeVisible: chartRange === '1d' || chartRange === '5d',
                secondsVisible: false,
                tickMarkFormatter: getTickFormatter(),
            },
            localization: {
                timeFormatter: getCrosshairFormatter(),
            },
        });

        const ro = new ResizeObserver(() => {
            chart.applyOptions({ width: container.clientWidth });
        });
        ro.observe(container);

        addSeries();
    }

    function updateChartTimeOptions() {
        if (!chart) return;
        chart.applyOptions({
            timeScale: {
                timeVisible: chartRange === '1d' || chartRange === '5d',
                tickMarkFormatter: getTickFormatter(),
            },
            localization: {
                timeFormatter: getCrosshairFormatter(),
            },
        });

    function addSeries() {
        if (mainSeries) {
            chart.removeSeries(mainSeries);
            mainSeries = null;
        }
        if (volumeSeries) {
            chart.removeSeries(volumeSeries);
            volumeSeries = null;
        }

        // Volume histogram overlay at the bottom of the main chart
        volumeSeries = chart.addHistogramSeries({
            priceFormat: { type: 'volume' },
            priceLineVisible: false,
            lastValueVisible: false,
            priceScaleId: 'volume',
        });
        chart.priceScale('volume').applyOptions({
            scaleMargins: { top: 0.82, bottom: 0 },
            ticksVisible: false,
            borderVisible: false,
        });

        const color = currentTab === 'nasdaq' ? CHART_COLORS.regular : CHART_COLORS.hlLine;

        if (chartType === 'line') {
            mainSeries = chart.addLineSeries({ color: color, lineWidth: 2 });
        } else if (chartType === 'candles') {
            mainSeries = chart.addCandlestickSeries({
                upColor: CHART_COLORS.candleUp, downColor: CHART_COLORS.candleDown,
                borderUpColor: CHART_COLORS.candleUp, borderDownColor: CHART_COLORS.candleDown,
                wickUpColor: CHART_COLORS.candleUp, wickDownColor: CHART_COLORS.candleDown,
            });
        }
    }

    // Determine if a timestamp is in extended hours based on trading periods
    function isExtendedHours(timestamp, tp) {
        if (!tp) return false;

        // Multi-day array of trading periods
        if (Array.isArray(tp)) {
            // Find the relevant day for this timestamp
            for (const dayTP of tp) {
                if (!dayTP || !dayTP.regular) continue;
                // Check if timestamp falls within this day's range (pre start to post end)
                const dayStart = dayTP.pre ? dayTP.pre.start : dayTP.regular.start;
                const dayEnd = dayTP.post ? dayTP.post.end : dayTP.regular.end;
                if (timestamp >= dayStart && timestamp < dayEnd) {
                    // Within this day — check if it's in regular hours
                    if (timestamp >= dayTP.regular.start && timestamp < (dayTP.post ? dayTP.post.start : dayTP.regular.end)) {
                        return false; // regular hours
                    }
                    return true; // pre or post market
                }
            }
            // Timestamp doesn't match any day's periods — likely overnight gap
            return false;
        }

        // Single-day trading period object
        if (!tp.regular) return false;
        // Pre-market: before regular start
        if (tp.pre && timestamp >= tp.pre.start && timestamp < tp.regular.start) return true;
        // Post-market: after regular end
        if (tp.post && timestamp >= tp.post.start && timestamp < tp.post.end) return true;
        return false;
    }

    // Detect gaps in data (> 2x the expected interval) to avoid connecting lines across breaks
    function getExpectedIntervalSec(interval) {
        const map = { '1m': 60, '2m': 120, '5m': 300, '15m': 900, '30m': 1800, '60m': 3600, '1h': 3600, '1d': 86400, '1wk': 604800 };
        return map[interval] || 300;
    }

    // Check if a timestamp falls in overnight/weekend gap (between post end and next pre start)
    function isInGap(timestamp, prevTimestamp, expectedInterval) {
        if (!prevTimestamp) return false;
        const gap = timestamp - prevTimestamp;
        // If gap is more than 3x expected interval, it's a session break
        return gap > expectedInterval * 3;
    }

    // ─── Chart Data Loading ─────────────────────────────────────────────────
    async function loadChartData() {
        if (currentTab === 'nasdaq') {
            await loadNasdaqChart();
        } else {
            await loadHlChart();
        }
    }

    // Cache for nasdaq intraday data (from fetchNasdaqData)
    let nasdaqIntradayCache = null;

    async function loadNasdaqChart() {
        try {
            // For default 5m/1d, reuse data from fetchNasdaqData if available
            if (chartInterval === '5m' && nasdaqIntradayCache) {
                renderChartData(nasdaqIntradayCache);
                return;
            }

            const period = INTERVAL_PERIODS[chartInterval] || '1d';
            const url = `${YAHOO_BASE}?interval=${chartInterval}&range=${period}&includePrePost=true`;

            const json = await yahooFetch(url);
            const result = json.chart.result[0];
            const timestamps = result.timestamp;
            const quote = result.indicators.quote[0];

            if (!timestamps || !timestamps.length) return;

            if (result.meta) {
                nasdaqPrevClose = result.meta.previousClose || nasdaqPrevClose;
                // Store all trading periods for multi-day ranges
                const todayTP = result.meta.tradingPeriods;
                if (todayTP && todayTP.regular && todayTP.regular.length) {
                    // Multi-day: store array of all days' periods
                    tradingPeriods = [];
                    for (let d = 0; d < todayTP.regular.length; d++) {
                        if (todayTP.regular[d] && todayTP.regular[d][0]) {
                            tradingPeriods.push({
                                pre: todayTP.pre ? todayTP.pre[d][0] : null,
                                regular: todayTP.regular[d][0],
                                post: todayTP.post ? todayTP.post[d][0] : null,
                            });
                        }
                    }
                    // If only 1 day, flatten for simpler handling
                    if (tradingPeriods.length === 1) tradingPeriods = tradingPeriods[0];
                } else if (result.meta.currentTradingPeriod) {
                    tradingPeriods = result.meta.currentTradingPeriod;
                }
            }

            const data = [];
            for (let i = 0; i < timestamps.length; i++) {
                const o = quote.open[i], h = quote.high[i], l = quote.low[i], c = quote.close[i];
                if (o == null || h == null || l == null || c == null) continue;
                data.push({ time: timestamps[i], open: o, high: h, low: l, close: c, volume: quote.volume ? quote.volume[i] : 0 });
            }

            if (!data.length) return;
            renderChartData(data);
        } catch (e) {
            console.error('Failed to load NASDAQ chart:', e);
        }
    }

    function renderChartData(data) {
        chartDataCache = data;

        // Determine trading periods for session coloring
        const tp = tradingPeriods;
        const expectedInterval = getExpectedIntervalSec(chartInterval);

        if (chartType === 'candles') {
            // Color candles differently for extended vs regular hours
            const coloredData = data.map((d, i) => {
                const ext = isExtendedHours(d.time, tp);
                const up = d.close >= d.open;
                if (ext) {
                    return {
                        ...d,
                        color: up ? CHART_COLORS.candleExtUp : CHART_COLORS.candleExtDown,
                        borderColor: up ? CHART_COLORS.candleExtUp : CHART_COLORS.candleExtDown,
                        wickColor: up ? CHART_COLORS.candleExtUp : CHART_COLORS.candleExtDown,
                    };
                }
                return d; // regular hours use series defaults
            });
            mainSeries.setData(coloredData);
        } else {
            // Line chart: color each segment based on session type
            // Use lineStyle to dim gap-crossing segments
            const lineData = [];
            for (let i = 0; i < data.length; i++) {
                const d = data[i];
                const ext = isExtendedHours(d.time, tp);
                const prevTime = i > 0 ? data[i - 1].time : null;
                const hasGap = isInGap(d.time, prevTime, expectedInterval);

                const point = {
                    time: d.time,
                    value: d.close,
                    color: ext ? CHART_COLORS.extended : CHART_COLORS.regular,
                };

                // If there's a gap before this point, insert a "break" by using
                // lineStyle: dashed for the connecting segment (lightweight-charts
                // doesn't support true breaks, but we can show a visual marker)
                if (hasGap && i > 0) {
                    // Add a marker at the gap point to show session boundary
                    point.color = ext ? CHART_COLORS.extended : CHART_COLORS.regular;
                }

                lineData.push(point);
            }
            mainSeries.setData(lineData);

            // Add markers at session boundaries (where gaps occur)
            const markers = [];
            for (let i = 1; i < data.length; i++) {
                if (isInGap(data[i].time, data[i-1].time, expectedInterval)) {
                    markers.push({
                        time: data[i].time,
                        position: 'inBar',
                        shape: 'circle',
                        color: '#ffffff44',
                        size: 0.5,
                    });
                }
            }
            if (markers.length > 0) {
                mainSeries.setMarkers(markers);
            }
        }

        // Volume bars with session-aware coloring
        if (volumeSeries) {
            const volData = data
                .filter(d => d.volume != null && d.volume > 0)
                .map(d => {
                    const ext = isExtendedHours(d.time, tp);
                    const up = d.close >= d.open;
                    let color;
                    if (ext) {
                        color = up ? CHART_COLORS.volExtUp : CHART_COLORS.volExtDown;
                    } else {
                        color = up ? CHART_COLORS.volUp : CHART_COLORS.volDown;
                    }
                    return { time: d.time, value: d.volume, color };
                });
            volumeSeries.setData(volData);
        }

        // Show/hide legend based on whether we have extended hours data
        const legend = document.getElementById('chart-legend');
        if (legend) {
            const hasExtended = tp && data.some(d => isExtendedHours(d.time, tp));
            legend.style.display = hasExtended ? 'flex' : 'none';
        }

        if (shouldFitContent) { applyVisibleRange(); shouldFitContent = false; }
    }

    function applyVisibleRange() {
        if (!chartDataCache.length) { chart.timeScale().fitContent(); return; }

        if (marketOnlyView) {
            applyMarketOnlyRange();
            return;
        }

        const now = Math.floor(Date.now() / 1000);
        const rangeSeconds = {
            '1d': 86400,
            '1mo': 30 * 86400,
            '1y': 365 * 86400,
            '5y': 5 * 365 * 86400,
            'max': null,
        };

        const seconds = rangeSeconds[chartRange];
        if (!seconds) {
            chart.timeScale().fitContent();
            return;
        }

        const from = now - seconds;
        chart.timeScale().setVisibleRange({ from, to: now });
    }

    function toggleMarketOnly() {
        marketOnlyView = !marketOnlyView;
        document.getElementById('btn-market-only').classList.toggle('active', marketOnlyView);
        applyVisibleRange();
    }

    function applyMarketOnlyRange() {
        if (!chart || !chartDataCache.length) return;
        const tp = tradingPeriods;
        if (!tp) { chart.timeScale().fitContent(); return; }

        // Get the most recent regular session boundaries
        let regStart, regEnd;
        if (Array.isArray(tp)) {
            // Multi-day: use last day's regular period
            const last = tp[tp.length - 1];
            if (last && last.regular) {
                regStart = last.regular.start;
                regEnd = last.regular.end || (last.post ? last.post.start : last.regular.start + 23400);
            }
        } else if (tp.regular) {
            regStart = tp.regular.start;
            regEnd = tp.regular.end || (tp.post ? tp.post.start : tp.regular.start + 23400);
        }

        if (regStart && regEnd) {
            chart.timeScale().setVisibleRange({ from: regStart, to: regEnd });
        } else {
            chart.timeScale().fitContent();
        }
    }

    async function loadHlChart() {
        try {
            const hlInterval = chartInterval === '60m' || chartInterval === '1h' ? '1h' : chartInterval;
            const now = Date.now();
            const resp = await fetch('https://api.hyperliquid.xyz/info', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type: 'candleSnapshot',
                    req: { coin: 'xyz:INTC', interval: hlInterval, startTime: now - 86400000, endTime: now }
                })
            });
            const candles = await resp.json();
            if (!candles.length) return;

            // Hide legend for HL (no extended hours concept)
            const legend = document.getElementById('chart-legend');
            if (legend) legend.style.display = 'none';

            if (chartType === 'candles') {
                const ohlc = candles.map(c => ({
                    time: Math.floor(parseInt(c.t) / 1000),
                    open: parseFloat(c.o), high: parseFloat(c.h),
                    low: parseFloat(c.l), close: parseFloat(c.c),
                }));
                mainSeries.setData(ohlc);
            } else {
                const lineData = candles.map(c => ({
                    time: Math.floor(parseInt(c.t) / 1000),
                    value: parseFloat(c.c),
                }));
                mainSeries.setData(lineData);
            }
            // HL candles include volume — render it
            if (volumeSeries) {
                const volData = candles
                    .filter(c => parseFloat(c.v || 0) > 0)
                    .map(c => ({
                        time: Math.floor(parseInt(c.t) / 1000),
                        value: parseFloat(c.v),
                        color: parseFloat(c.c) >= parseFloat(c.o)
                            ? CHART_COLORS.volUp : CHART_COLORS.volDown,
                    }));
                volumeSeries.setData(volData);
            }
            if (shouldFitContent) { chart.timeScale().fitContent(); shouldFitContent = false; }
        } catch (e) {
            console.error('Failed to load HL chart:', e);
        }
    }

    // ─── NASDAQ Data (from Yahoo chart API — replaces yfinance backend) ─────
    function formatVol(vol) {
        if (vol === 0 || vol === null || vol === undefined) return 'N/A';
        if (vol >= 1000000) return (vol / 1000000).toFixed(2) + 'M';
        if (vol >= 1000) return (vol / 1000).toFixed(1) + 'K';
        return vol.toString();
    }

    function updateMarketCap(price) {
        const mcap = price * INTC_SHARES;
        const mcapEl = document.getElementById('nasdaq-mcap');
        if (mcap >= 1e12) {
            mcapEl.textContent = 'Market Cap: $' + (mcap / 1e12).toFixed(1) + 'T';
        } else {
            mcapEl.textContent = 'Market Cap: $' + (mcap / 1e9).toFixed(1) + 'B';
        }
    }

    async function fetchNasdaqData() {
        try {
            // Fetch intraday data (5m interval, 1d range) for session breakdown
            const url = `${YAHOO_BASE}?interval=5m&range=1d&includePrePost=true`;
            const json = await yahooFetch(url);
            const result = json.chart.result[0];
            const meta = result.meta;
            const timestamps = result.timestamp || [];
            const quote = result.indicators.quote[0];

            // Time display
            const now = new Date();
            document.getElementById('time-display').innerHTML = formatDualTime(now);

            // Market status
            const ms = getMarketStatus();
            const badge = document.getElementById('market-badge');
            badge.textContent = ms.label;
            badge.className = `status-badge badge-${ms.status}`;

            // NASDAQ card styling
            const nasdaqCard = document.getElementById('nasdaq-card');
            nasdaqCard.className = `card card-nasdaq ${ms.status}${currentTab === 'nasdaq' ? ' focused' : ''}`;

            // Price from meta (most recent)
            // During pre/post/closed: regularMarketPrice = last session close (our prev close)
            // During regular hours: previousClose = yesterday's close (correct)
            if (ms.status === 'market') {
                nasdaqPrevClose = meta.previousClose;
            } else {
                nasdaqPrevClose = meta.regularMarketPrice || meta.previousClose;
            }
            const lastPrice = meta.regularMarketPrice;

            // Store official close from meta (includes closing auction — more accurate than candle data)
            window._yahooLastPrice = lastPrice;
            window._yahooPrevClose = meta.previousClose;

            // Session breakdown from intraday candles
            // Use tradingPeriods (today's actual periods) instead of currentTradingPeriod (which may be tomorrow's)
            const todayTP = meta.tradingPeriods;
            const tp = (todayTP && todayTP.regular && todayTP.regular[0] && todayTP.regular[0][0])
                ? {
                    pre: todayTP.pre[0][0],
                    regular: todayTP.regular[0][0],
                    post: todayTP.post[0][0],
                }
                : meta.currentTradingPeriod;
            // Update global tradingPeriods so renderChartData can use it (especially via cache path)
            if (tp) tradingPeriods = tp;
            let preHigh = -Infinity, preLow = Infinity, preVol = 0, preOpen = null;
            let regHigh = -Infinity, regLow = Infinity, regVol = 0, regOpen = null;
            let postHigh = -Infinity, postLow = Infinity, postVol = 0, postOpen = null;
            let hasPre = false, hasReg = false, hasPost = false;

            // Also build chart data cache from this response
            const chartData = [];
            for (let i = 0; i < timestamps.length; i++) {
                const t = timestamps[i];
                const o = quote.open[i], h = quote.high[i], l = quote.low[i], c = quote.close[i];
                const v = quote.volume ? quote.volume[i] : 0;
                if (h == null || l == null) continue;
                if (o != null && c != null) {
                    chartData.push({ time: t, open: o, high: h, low: l, close: c, volume: v });
                }

                if (tp && t >= tp.pre.start && t < tp.regular.start) {
                    hasPre = true;
                    if (preOpen === null && o != null) preOpen = o;
                    preHigh = Math.max(preHigh, h);
                    preLow = Math.min(preLow, l);
                    preVol += v || 0;
                } else if (tp && t >= tp.regular.start && t < tp.post.start) {
                    hasReg = true;
                    if (regOpen === null && o != null) regOpen = o;
                    regHigh = Math.max(regHigh, h);
                    regLow = Math.min(regLow, l);
                    regVol += v || 0;
                } else if (tp && t >= tp.post.start && t < tp.post.end) {
                    hasPost = true;
                    if (postOpen === null && o != null) postOpen = o;
                    postHigh = Math.max(postHigh, h);
                    postLow = Math.min(postLow, l);
                    postVol += v || 0;
                }
            }

            let html = '';
            if (hasPre) html += `<b>Pre:</b> O $${preOpen?.toFixed(2) || '—'} / H $${preHigh.toFixed(2)} / L $${preLow.toFixed(2)} · Vol: ${formatVol(preVol)}<br>`;
            if (hasReg) html += `<b>Regular:</b> O $${regOpen?.toFixed(2) || '—'} / H $${regHigh.toFixed(2)} / L $${regLow.toFixed(2)} · Vol: ${formatVol(regVol)}<br>`;
            if (hasPost) html += `<b>Post:</b> O $${postOpen?.toFixed(2) || '—'} / H $${postHigh.toFixed(2)} / L $${postLow.toFixed(2)} · Vol: ${formatVol(postVol)}`;
            document.getElementById('nasdaq-sessions').innerHTML = html;

            // Extended price display (post/pre market last traded price)
            // Also determine the stable main price from candle data
            const extEl2 = document.getElementById('nasdaq-extended');
            const priceEl = document.getElementById('nasdaq-price');
            const mainLastPrice = window._yahooLastPrice;
            const yahooPrevClose = window._yahooPrevClose;

            // Get regular session close from candle data
            let regularCloseFromCandles = null;
            if (tp) {
                for (let i = timestamps.length - 1; i >= 0; i--) {
                    const t = timestamps[i], c = quote.close[i];
                    if (c != null && t >= tp.regular.start && t < tp.post.start) {
                        regularCloseFromCandles = c;
                        break;
                    }
                }
            }

            if (ms.status === 'postmarket' || ms.status === 'closed') {
                // Big price = official close from meta (includes closing auction), small = post-market price
                const mainPrice = mainLastPrice || regularCloseFromCandles;

                if (prevNasdaqPrice !== null && mainPrice !== prevNasdaqPrice) {
                    priceEl.classList.remove('price-flash-up', 'price-flash-down');
                    void priceEl.offsetWidth;
                    priceEl.classList.add(mainPrice > prevNasdaqPrice ? 'price-flash-up' : 'price-flash-down');
                }
                prevNasdaqPrice = mainPrice;
                priceEl.textContent = `$${mainPrice.toFixed(2)}`;

                // Change vs previous close
                if (yahooPrevClose) {
                    const change = mainPrice - yahooPrevClose;
                    const pct = (change / yahooPrevClose) * 100;
                    const sign = change >= 0 ? '+' : '';
                    const cls = change >= 0 ? 'up' : 'down';
                    document.getElementById('nasdaq-meta').innerHTML =
                        `<span class="change ${cls}">${sign}${change.toFixed(2)} (${sign}${pct.toFixed(2)}%)</span>` +
                        `<span class="prev-close">Prev Close: $${yahooPrevClose.toFixed(2)}</span>`;
                }

                // Post-market price (from last post candle)
                let postLastPrice = null;
                if (tp) {
                    for (let i = timestamps.length - 1; i >= 0; i--) {
                        const t = timestamps[i], c = quote.close[i];
                        if (c != null && t >= tp.post.start && t < tp.post.end) {
                            postLastPrice = c;
                            break;
                        }
                    }
                }
                if (postLastPrice && mainPrice) {
                    const extChange = postLastPrice - mainPrice;
                    const extPct = (extChange / mainPrice) * 100;
                    const extSign = extChange >= 0 ? '+' : '';
                    const extCls = extChange >= 0 ? 'up' : 'down';
                    extEl2.innerHTML =
                        `<span class="ext-label">Post-Market:</span> ` +
                        `<span class="ext-value">$${postLastPrice.toFixed(2)}</span> ` +
                        `<span class="ext-change ${extCls}">${extSign}${extChange.toFixed(2)} (${extSign}${extPct.toFixed(2)}%)</span>`;
                } else {
                    extEl2.innerHTML = '';
                }
                updateMarketCap(postLastPrice || mainPrice);
            } else if (ms.status === 'premarket') {
                // Big price = official close from meta (includes closing auction), small = pre-market price
                // During premarket, regularMarketPrice = last session's close (correct prev close)
                const mainPrice = mainLastPrice || regularCloseFromCandles;

                if (prevNasdaqPrice !== null && mainPrice !== prevNasdaqPrice) {
                    priceEl.classList.remove('price-flash-up', 'price-flash-down');
                    void priceEl.offsetWidth;
                    priceEl.classList.add(mainPrice > prevNasdaqPrice ? 'price-flash-up' : 'price-flash-down');
                }
                prevNasdaqPrice = mainPrice;
                priceEl.textContent = `$${mainPrice.toFixed(2)}`;

                if (yahooPrevClose) {
                    const change = mainPrice - yahooPrevClose;
                    const pct = (change / yahooPrevClose) * 100;
                    const sign = change >= 0 ? '+' : '';
                    const cls = change >= 0 ? 'up' : 'down';
                    document.getElementById('nasdaq-meta').innerHTML =
                        `<span class="change ${cls}">${sign}${change.toFixed(2)} (${sign}${pct.toFixed(2)}%)</span>` +
                        `<span class="prev-close">Prev Close: $${yahooPrevClose.toFixed(2)}</span>`;
                }

                // Pre-market price (from last pre candle)
                let preLastPrice = null;
                if (tp) {
                    for (let i = timestamps.length - 1; i >= 0; i--) {
                        const t = timestamps[i], c = quote.close[i];
                        if (c != null && t >= tp.pre.start && t < tp.regular.start) {
                            preLastPrice = c;
                            break;
                        }
                    }
                }
                if (preLastPrice && mainPrice) {
                    const extChange = preLastPrice - mainPrice;
                    const extPct = (extChange / mainPrice) * 100;
                    const extSign = extChange >= 0 ? '+' : '';
                    const extCls = extChange >= 0 ? 'up' : 'down';
                    extEl2.innerHTML =
                        `<span class="ext-label">Pre-Market:</span> ` +
                        `<span class="ext-value">$${preLastPrice.toFixed(2)}</span> ` +
                        `<span class="ext-change ${extCls}">${extSign}${extChange.toFixed(2)} (${extSign}${extPct.toFixed(2)}%)</span>`;
                } else {
                    extEl2.innerHTML = '';
                }
                updateMarketCap(preLastPrice || mainPrice);
            } else {
                // Market open — show live price from meta
                if (mainLastPrice) {
                    if (prevNasdaqPrice !== null && mainLastPrice !== prevNasdaqPrice) {
                        priceEl.classList.remove('price-flash-up', 'price-flash-down');
                        void priceEl.offsetWidth;
                        priceEl.classList.add(mainLastPrice > prevNasdaqPrice ? 'price-flash-up' : 'price-flash-down');
                    }
                    prevNasdaqPrice = mainLastPrice;
                    priceEl.textContent = `$${mainLastPrice.toFixed(2)}`;

                    if (yahooPrevClose) {
                        const change = mainLastPrice - yahooPrevClose;
                        const pct = (change / yahooPrevClose) * 100;
                        const sign = change >= 0 ? '+' : '';
                        const cls = change >= 0 ? 'up' : 'down';
                        document.getElementById('nasdaq-meta').innerHTML =
                            `<span class="change ${cls}">${sign}${change.toFixed(2)} (${sign}${pct.toFixed(2)}%)</span>` +
                            `<span class="prev-close">Prev Close: $${yahooPrevClose.toFixed(2)}</span>`;
                    }
                }
                extEl2.innerHTML = '';
                updateMarketCap(mainLastPrice);
            }

            // Cache intraday data for chart reuse
            if (chartData.length) nasdaqIntradayCache = chartData;

            // Sync chart
            if (currentTab === 'nasdaq') loadChartData();

        } catch (e) {
            console.error('NASDAQ fetch error:', e);
            // Still update time even if API fails
            document.getElementById('time-display').innerHTML = formatDualTime(new Date());
        }
    }

    // ─── Yahoo Finance WebSocket (live streaming) ───────────────────────────
    const YahooProto = `
        syntax = "proto3";
        message PricingData {
            string id = 1;
            float price = 2;
            int64 time = 3;
            string exchange = 4;
            string quoteType = 5;
            float changePercent = 8;
            float dayVolume = 9;
            float dayHigh = 10;
            float dayLow = 11;
            float change = 12;
            float previousClose = 15;
            string marketHours = 20;
        }
    `;

    let yahooRoot = null;
    let YahooPricingData = null;

    function initYahooProto() {
        yahooRoot = protobuf.parse(YahooProto).root;
        YahooPricingData = yahooRoot.lookupType('PricingData');
    }

    function connectYahooWebSocket() {
        if (yahooWs && yahooWs.readyState === WebSocket.OPEN) return;

        yahooWs = new WebSocket('wss://streamer.finance.yahoo.com/');

        yahooWs.onopen = () => {
            yahooWs.send(JSON.stringify({ subscribe: ['INTC'] }));
        };

        yahooWs.onmessage = (event) => {
            try {
                const bytes = Uint8Array.from(atob(event.data), c => c.charCodeAt(0));
                const decoded = YahooPricingData.decode(bytes);
                if (decoded.price && decoded.price > 0) {
                    updateYahooPrice(decoded);
                }
            } catch (e) {}
        };

        yahooWs.onclose = () => {
            yahooReconnectTimer = setTimeout(connectYahooWebSocket, 5000);
        };

        yahooWs.onerror = () => { yahooWs.close(); };
    }

    function updateYahooPrice(data) {
        const ms = getMarketStatus();
        const price = data.price;

        // During pre/post market, update the small extended price only
        if (ms.status === 'closed') {
            prevYahooPrice = price;
            return;
        }

        if (ms.status === 'premarket' || ms.status === 'postmarket') {
            // Update the extended sub-price line, not the big price
            const extEl = document.getElementById('nasdaq-extended');
            const refPrice = nasdaqPrevClose; // last regular close
            const label = ms.status === 'premarket' ? 'Pre-Market' : 'Post-Market';
            if (refPrice) {
                const extChange = price - refPrice;
                const extPct = (extChange / refPrice) * 100;
                const extSign = extChange >= 0 ? '+' : '';
                const extCls = extChange >= 0 ? 'up' : 'down';
                extEl.innerHTML =
                    `<span class="ext-label">${label}:</span> ` +
                    `<span class="ext-value">$${price.toFixed(2)}</span> ` +
                    `<span class="ext-change ${extCls}">${extSign}${extChange.toFixed(2)} (${extSign}${extPct.toFixed(2)}%)</span>`;
            }
            updateMarketCap(price);
            prevYahooPrice = price;

            // Real-time chart update during extended hours
            if (currentTab === 'nasdaq' && mainSeries && chartDataCache.length) {
                const last = chartDataCache[chartDataCache.length - 1];
                last.close = price;
                if (price > last.high) last.high = price;
                if (price < last.low) last.low = price;
                if (chartType === 'candles') {
                    mainSeries.update({
                        ...last,
                        color: CHART_COLORS.candleExtUp,
                        borderColor: CHART_COLORS.candleExtUp,
                        wickColor: CHART_COLORS.candleExtUp,
                    });
                } else {
                    mainSeries.update({ time: last.time, value: price, color: CHART_COLORS.extended });
                }
            }
            return;
        }

        // Regular market hours — update the big price
        const priceEl = document.getElementById('nasdaq-price');

        if (prevYahooPrice !== null && price !== prevYahooPrice) {
            priceEl.classList.remove('price-flash-up', 'price-flash-down');
            void priceEl.offsetWidth;
            priceEl.classList.add(price > prevYahooPrice ? 'price-flash-up' : 'price-flash-down');
        }
        prevYahooPrice = price;
        priceEl.textContent = `$${price.toFixed(2)}`;
        updateMarketCap(price);

        const prevClose = nasdaqPrevClose;
        if (prevClose) {
            const change = price - prevClose;
            const pct = (change / prevClose) * 100;
            const sign = change >= 0 ? '+' : '';
            const cls = change >= 0 ? 'up' : 'down';
            document.getElementById('nasdaq-meta').innerHTML =
                `<span class="change ${cls}">${sign}${change.toFixed(2)} (${sign}${pct.toFixed(2)}%)</span>` +
                `<span class="prev-close">Prev Close: $${prevClose.toFixed(2)}</span>`;
        }

        // Real-time chart update from WS tick
        if (currentTab === 'nasdaq' && mainSeries && chartDataCache.length) {
            const last = chartDataCache[chartDataCache.length - 1];
            last.close = price;
            if (price > last.high) last.high = price;
            if (price < last.low) last.low = price;
            if (chartType === 'candles') {
                mainSeries.update(last);
            } else {
                mainSeries.update({ time: last.time, value: price });
            }
            // Keep intraday cache in sync
            if (nasdaqIntradayCache && nasdaqIntradayCache.length) {
                const lastCached = nasdaqIntradayCache[nasdaqIntradayCache.length - 1];
                lastCached.close = price;
                if (price > lastCached.high) lastCached.high = price;
                if (price < lastCached.low) lastCached.low = price;
            }
        }
    }

    // ─── Hyperliquid WebSocket ──────────────────────────────────────────────
    function connectHlWebSocket() {
        if (hlWs && hlWs.readyState === WebSocket.OPEN) return;

        hlWs = new WebSocket('wss://api.hyperliquid.xyz/ws');

        hlWs.onopen = () => {
            hlWs.send(JSON.stringify({
                method: 'subscribe',
                subscription: { type: 'l2Book', coin: 'xyz:INTC' }
            }));
        };

        hlWs.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.channel === 'l2Book' && msg.data) {
                    const levels = msg.data.levels;
                    if (levels && levels[0] && levels[1] && levels[0].length && levels[1].length) {
                        const bid = parseFloat(levels[0][0].px);
                        const ask = parseFloat(levels[1][0].px);
                        const mid = (bid + ask) / 2;
                        updateHlPrice(mid);
                    }
                }
            } catch (e) {}
        };

        hlWs.onclose = () => {
            hlReconnectTimer = setTimeout(connectHlWebSocket, 3000);
        };

        hlWs.onerror = () => { hlWs.close(); };
    }

    function updateHlPrice(price) {
        const priceEl = document.getElementById('hl-price');

        if (prevHlPrice !== null && price !== prevHlPrice) {
            priceEl.classList.remove('price-flash-up', 'price-flash-down');
            void priceEl.offsetWidth;
            priceEl.classList.add(price > prevHlPrice ? 'price-flash-up' : 'price-flash-down');
        }
        prevHlPrice = price;
        priceEl.textContent = `$${price.toFixed(2)}`;

        if (nasdaqPrevClose) {
            const change = price - nasdaqPrevClose;
            const pct = (change / nasdaqPrevClose) * 100;
            const sign = change >= 0 ? '+' : '';
            const cls = change >= 0 ? 'up' : 'down';
            document.getElementById('hl-meta').innerHTML =
                `<span class="change ${cls}">${sign}${change.toFixed(2)} (${sign}${pct.toFixed(2)}%)</span>` +
                `<span class="prev-close">Prev Close: $${nasdaqPrevClose.toFixed(2)}</span>`;
        }
    }

    async function fetchHlStats() {
        try {
            const now = Date.now();
            const resp = await fetch('https://api.hyperliquid.xyz/info', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type: 'candleSnapshot',
                    req: { coin: 'xyz:INTC', interval: '1h', startTime: now - 86400000, endTime: now }
                })
            });
            const candles = await resp.json();
            if (candles.length) {
                const high = Math.max(...candles.map(c => parseFloat(c.h)));
                const low = Math.min(...candles.map(c => parseFloat(c.l)));
                const vol = candles.reduce((sum, c) => sum + parseFloat(c.v || 0), 0);
                document.getElementById('hl-details').innerHTML =
                    `<b>24 Hour:</b> High $${high.toFixed(2)} / Low $${low.toFixed(2)} · Volume: ${formatVol(vol)}`;
            }
        } catch (e) {}
    }

    // ─── Init ───────────────────────────────────────────────────────────────
    function init() {
        initYahooProto();
        fetchSharesOutstanding();
        fetchATH();
        // Auto-select tab based on market status
        const ms = getMarketStatus();
        if (ms.status === 'closed') {
            currentTab = 'hl';
        } else {
            currentTab = 'nasdaq';
        }
        document.querySelectorAll('.chart-tabs button').forEach((btn, i) => {
            btn.classList.toggle('active', (i === 0 && currentTab === 'nasdaq') || (i === 1 && currentTab === 'hl'));
        });
        updateCardFocus();
        createChart();
        fetchNasdaqData();
        fetchHlStats();
        connectHlWebSocket();
        connectYahooWebSocket();

        // Poll NASDAQ data every 30s (API rate-friendly, WS handles live price)
        setInterval(fetchNasdaqData, 30000);
        // Refresh HL stats every 15s
        setInterval(fetchHlStats, 15000);
        // Refresh HL chart every 5s (only when on HL tab)
        setInterval(() => { if (currentTab === 'hl') loadChartData(); }, 5000);
        // Update time display every second
        setInterval(() => {
            document.getElementById('time-display').innerHTML = formatDualTime(new Date());
            // Update market status badge
            const ms = getMarketStatus();
            const badge = document.getElementById('market-badge');
            badge.textContent = ms.label;
            badge.className = `status-badge badge-${ms.status}`;
            document.getElementById('nasdaq-card').className = `card card-nasdaq ${ms.status}${currentTab === 'nasdaq' ? ' focused' : ''}`;
            // Dim elements based on market status
            const nasDim = ms.status !== 'market';
            const extDim = ms.status === 'closed' || ms.status === 'market';
            const hlDim = ms.status !== 'closed';
            document.getElementById('nasdaq-price').classList.toggle('dim-element', nasDim);
            document.getElementById('nasdaq-meta').classList.toggle('dim-element', nasDim);
            document.getElementById('nasdaq-extended').classList.toggle('dim-element', extDim);
            document.getElementById('hl-price').classList.toggle('dim-element', hlDim);
            document.getElementById('hl-meta').classList.toggle('dim-element', hlDim);
        }, 1000);
    }

    document.addEventListener('DOMContentLoaded', init);
    </script>
