<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist — Stock Dashboard</title>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="be0b9ce8-f4bc-4d6f-94fe-b0bcce0b7518"></script>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.6/dist/protobuf.min.js"></script>
    <style>
        :root {
            --bg: #0f0f14;
            --surface: #1a1a24;
            --surface2: #22222e;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text-dim: #888899;
            --green: #00c853;
            --red: #ff1744;
            --amber: #ffc107;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
        }

        /* ─── Navigation ─────────────────────────────────────── */
        .nav-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 0;
        }
        .nav-tabs a {
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 8px 8px 0 0;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom: none;
            transition: all 0.2s;
        }
        .nav-tabs a.active {
            color: var(--text);
            background: var(--bg);
            border-color: var(--text-dim);
        }
        .nav-tabs a:hover:not(.active) { color: var(--text); }

        .nav-title {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 2px 20px rgba(0,0,0,1), 0 0 40px rgba(0,0,0,0.8), 0 0 80px rgba(0,0,0,0.5);
            text-align: center;
            padding: 0 0 180px;
            margin-top: -40px;
            opacity: 1;
            pointer-events: none;
        }

        .time-fixed {
            display: none;
        }

        .header {
            display: none;
        }

        @media (max-width: 640px) {
            .nav-title { font-size: 1.2rem; letter-spacing: 3px; padding: 4px 0; margin-top: 80px; margin-bottom: 60px; margin-left: -8px; margin-right: -8px; background: rgba(0,0,0,0.6); }
            body { padding: 8px; overflow-x: hidden; }
            .casino-bg { top: -8px; left: -8px; right: -8px; height: 296px; opacity: 1; }
        }

        /* ─── Stock Grid ─────────────────────────────────────── */
        .section-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin: 20px 0 10px;
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            background: rgba(15,15,20,0.75);
            border-radius: 6px 6px 0 0;
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .section-label:first-of-type { margin-top: 0; }
        .section-et {
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--text-dim);
            margin-left: auto;
            letter-spacing: 0.5px;
        }
        .section-hours {
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            opacity: 0.7;
            margin-left: 8px;
            text-transform: none;
        }

        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            margin-bottom: 8px;
        }

        #stock-grid-kr {
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
        }

        @media (max-width: 640px) {
            .stock-grid { grid-template-columns: 1fr; }
            #stock-grid-kr { grid-template-columns: 1fr; }
            .section-label {
                flex-direction: row;
                flex-wrap: nowrap;
                padding: 6px 10px;
                gap: 6px;
                font-size: 0.7rem;
            }
            .section-hours {
                display: none;
            }
            .section-et {
                margin-left: auto;
                font-size: 0.6rem;
            }
        }

        .stock-card {
            background:
                radial-gradient(ellipse at 15% 10%, color-mix(in srgb, var(--card-accent) 10%, transparent) 0%, transparent 60%),
                radial-gradient(ellipse at 85% 90%, color-mix(in srgb, var(--card-accent) 5%, transparent) 0%, transparent 50%),
                var(--surface);
            border: 1px solid color-mix(in srgb, var(--card-accent) 18%, var(--border));
            border-radius: 14px;
            padding: 18px 20px 16px;
            transition: transform 0.25s ease, box-shadow 0.35s ease, border-color 0.35s ease;
            position: relative;
            overflow: hidden;
        }

        .stock-card:hover {
            transform: translateY(-3px);
            border-color: color-mix(in srgb, var(--card-accent) 45%, var(--border));
            box-shadow:
                0 8px 32px -8px color-mix(in srgb, var(--card-accent) 25%, transparent),
                0 2px 8px rgba(0,0,0,0.3);
        }

        .stock-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg,
                color-mix(in srgb, var(--card-accent) 80%, white) 0%,
                var(--card-accent) 40%,
                transparent 100%);
        }



        .stock-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .stock-logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
        }

        .stock-name {
            font-size: 0.78rem;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .stock-ticker {
            font-size: 0.65rem;
            color: var(--card-accent, var(--text-dim));
            font-weight: 800;
            margin-left: auto;
            background: color-mix(in srgb, var(--card-accent) 12%, transparent);
            padding: 3px 8px;
            border-radius: 4px;
            letter-spacing: 1px;
            border: 1px solid color-mix(in srgb, var(--card-accent) 25%, transparent);
        }

        .stock-prices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .price-block {
            text-align: center;
        }

        .price-block-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 2px;
        }

        .price-block-value {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .price-block-change {
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 3px;
        }

        .price-block-change.up { color: var(--green); }
        .price-block-change.down { color: var(--red); }
        .price-block-change .up { color: var(--green); }
        .price-block-change .down { color: var(--red); }
        .price-block-change .prev-ref { color: var(--text-dim); font-weight: 400; }

        .price-block.hl-dimmed {
            opacity: 0.3;
        }
        .price-block.nasdaq-dimmed {
            opacity: 0.3;
        }
        .price-block.krw-dimmed {
            opacity: 0.3;
        }
        .stock-extended.ext-dimmed {
            opacity: 0.3;
        }

        .stock-meta {
            font-size: 0.68rem;
            color: var(--text-dim);
            margin-top: 8px;
            padding-top: 0;
            display: flex;
            justify-content: center;
        }
        .stock-meta.has-volume {
            justify-content: space-between;
        }
        .stock-meta .meta-vol { display: none; }
        .stock-meta .meta-avgvol { display: none; }
        .stock-meta.has-volume .meta-vol { display: inline; }
        .stock-meta.has-volume .meta-avgvol { display: inline; }

        .stock-extended {
            font-size: 1.05rem;
            color: var(--text-dim);
            margin-top: 8px;
            text-align: center;
            min-height: 0;
        }
        .stock-extended:empty {
            display: none;
        }
        .stock-extended .ext-label {
            font-weight: 600;
            color: var(--amber);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stock-extended .ext-value { font-weight: 700; color: var(--text); }
        .stock-extended .ext-change { font-weight: 600; }
        .stock-extended .ext-change.up { color: var(--green); }
        .stock-extended .ext-change.down { color: var(--red); }

        .stock-ohl {
            font-size: 0.68rem;
            color: var(--text-dim);
            margin-top: 8px;
            padding-top: 8px;
            padding-bottom: 8px;
            border-top: 1px solid color-mix(in srgb, var(--card-accent) 12%, var(--border));
            border-bottom: 1px solid color-mix(in srgb, var(--card-accent) 12%, var(--border));
            text-align: center;
            letter-spacing: 0.3px;
        }
        .stock-ohl:empty {
            display: none;
        }
        .stock-ohl.ohl-dimmed .ohl-label,
        .stock-ohl.ohl-dimmed .ohl-value {
            opacity: 0.3;
        }
        .stock-ohl .ohl-label {
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 4px;
        }
        .stock-ohl .ohl-value {
            color: var(--text);
            font-weight: 600;
        }

        .price-flash-up { animation: flashGreen 1s ease-out; }
        .price-flash-down { animation: flashRed 1s ease-out; }

        /* ─── Total Market Cap Bar ────────────────────────── */
        .mcap-summary {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 18px;
            margin-bottom: 12px;
        }
        .mcap-summary-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }
        .mcap-summary-value {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text);
        }
        .mcap-summary-change {
            font-size: 0.8rem;
            font-weight: 700;
        }
        .mcap-summary-change .up { color: var(--green); }
        .mcap-summary-change .down { color: var(--red); }

        /* ─── INTC vs AMD Battle Bar ─────────────────────────── */
        .battle-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 18px 14px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }
        .battle-bar-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }
        .battle-bar-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
        }
        .battle-bar-verdict {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-dim);
        }
        .battle-bar-verdict.intc { color: #3a9bde; }
        .battle-bar-verdict.amd { color: #7AB648; }
        .battle-bar-track {
            position: relative;
            display: flex;
            height: 16px;
            border-radius: 8px;
            overflow: hidden;
            background: var(--surface2);
            border: 1px solid var(--border);
        }
        .battle-bar-fill-intc {
            width: 50%;
            background: linear-gradient(90deg, #004d85, #3a9bde);
            height: 100%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .battle-bar-fill-amd {
            width: 50%;
            background: linear-gradient(90deg, #7AB648, #4c7a1f);
            height: 100%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .battle-bar-center {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255,255,255,0.6);
            transform: translateX(-1px);
            z-index: 2;
            pointer-events: none;
        }
        .battle-bar-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .battle-label-intc { color: #3a9bde; }
        .battle-label-amd { color: #7AB648; }
        .battle-diff {
            font-weight: 800;
            color: var(--text);
        }

        .casino-badge {
            height: 8em;
            margin-left: auto;
            opacity: 0.9;
            border-radius: 6px;
            padding: 4px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            transition: opacity 0.3s;
            display: none;
        }
        .casino-badge:hover {
            opacity: 1;
        }

        .casino-bg {
            position: absolute;
            top: -16px;
            left: -16px;
            right: -16px;
            height: 380px;
            background: url('logos/Casino_desktop.jpg') center center / 100% auto no-repeat;
            opacity: 0.7;
            pointer-events: none;
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%);
            z-index: 0;
        }

        @media (max-width: 640px) {
            .casino-bg {
                background-image: url('logos/Casino_mobile.jpg');
                height: 280px;
            }
        }

        body {
            position: relative;
        }

        .nav-tabs, .nav-title, .header, .section-label, .mcap-summary, .stock-grid {
            position: relative;
            z-index: 1;
        }

        .mcap-prev-ref {
            color: var(--text-dim);
            font-weight: 400;
        }

        .stock-ath {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 6px;
            padding-top: 6px;
            padding-bottom: 6px;
            border-top: 1px solid color-mix(in srgb, var(--card-accent) 12%, var(--border));
            border-bottom: 1px solid color-mix(in srgb, var(--card-accent) 12%, var(--border));
            text-align: center;
            letter-spacing: 0.3px;
            line-height: 1.8;
        }
        .stock-ath .ath-label {
            font-weight: 700;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }
        .stock-ath .ath-value {
            color: var(--text);
            font-weight: 600;
        }
        .stock-ath .ath-pct {
            font-weight: 600;
            color: var(--text-dim);
        }
        .stock-ath .ath-divider {
            border: none;
            border-top: 1px solid color-mix(in srgb, var(--card-accent) 12%, var(--border));
            margin: 4px 0;
        }

        /* ─── Sentiment Indicator ─────────────────────────── */
        .stock-sentiment {
            text-align: center;
            margin-top: 8px;
            padding: 8px 0;
            border-top: 1px solid color-mix(in srgb, var(--card-accent) 12%, var(--border));
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            padding: 0;
            margin: 0;
            transition: max-height 0.4s ease, opacity 0.3s ease, padding 0.3s ease, margin 0.3s ease;
        }
        .stock-sentiment.visible {
            max-height: 200px;
            opacity: 1;
            padding: 0;
            margin-top: 6px;
            margin-bottom: -12px;
        }
        .stock-sentiment img {
            height: 75px;
            border-radius: 6px;
            transition: opacity 0.3s ease;
        }

        @keyframes flashGreen {
            0% { color: var(--green); text-shadow: 0 0 12px rgba(0,200,83,0.5); }
            100% { color: var(--text); text-shadow: none; }
        }
        @keyframes flashRed {
            0% { color: var(--red); text-shadow: 0 0 12px rgba(255,23,68,0.5); }
            100% { color: var(--text); text-shadow: none; }
        }
    </style>
</head>
<body>
    <div class="casino-bg"></div>
    <div class="nav-tabs">
        <a href="index.html">INTC Dashboard</a>
        <a href="watchlist.html" class="active">Watchlist</a>
    </div>
    <div class="time-fixed" id="time-display">--</div>
    </div>

    <div class="nav-title">Watchlist</div>

    <div class="header">
        <h1>Watchlist</h1>
        <div class="time-display" id="time-display-legacy">--</div>
    </div>

    <div class="battle-bar" id="battle-bar">
        <div class="battle-bar-header">
            <span class="battle-bar-title">INTC vs AMD · Change %</span>
            <span class="battle-bar-verdict" id="battle-verdict">—</span>
        </div>
        <div class="battle-bar-track">
            <div class="battle-bar-fill-intc" id="battle-fill-intc"></div>
            <div class="battle-bar-fill-amd" id="battle-fill-amd"></div>
            <div class="battle-bar-center"></div>
        </div>
        <div class="battle-bar-labels">
            <span class="battle-label-intc">INTC <span id="battle-pct-intc">—</span></span>
            <span class="battle-diff" id="battle-diff">—</span>
            <span class="battle-label-amd">AMD <span id="battle-pct-amd">—</span></span>
        </div>
    </div>

    <div class="section-label">US Market <span class="section-hours">Pre 1:30 PM – 7:00 PM · Market 7:00 PM – 1:30 AM · Post 1:30 AM – 5:30 AM IST</span><span class="section-et" id="et-clock"></span></div>
    <div class="mcap-summary" id="mcap-summary-us">
        <span class="mcap-summary-label">Watchlist Mkt Cap</span>
        <span class="mcap-summary-value" id="mcap-total-us">—</span>
        <span class="mcap-summary-change" id="mcap-chg-us"></span>
        <img src="logos/casino.png" alt="casino" class="casino-badge">
    </div>
    <div class="stock-grid" id="stock-grid-us"></div>

    <div class="section-label">Korean Market (KRX) <span class="section-hours">Market 5:30 AM – 12:00 PM IST</span></div>
    <div class="mcap-summary" id="mcap-summary-kr">
        <span class="mcap-summary-label">Watchlist Mkt Cap</span>
        <span class="mcap-summary-value" id="mcap-total-kr">—</span>
        <span class="mcap-summary-change" id="mcap-chg-kr"></span>
    </div>
    <div class="stock-grid" id="stock-grid-kr"></div>

    <script>
    // ─── Stock Configuration ────────────────────────────────────────────────
    const STOCKS = [
        { ticker: 'INTC', name: 'Intel', hl: 'xyz:INTC', color: '#0071C5', logo: 'logos/INTC.svg' },
        { ticker: 'AMD', name: 'AMD', hl: 'xyz:AMD', color: '#7AB648', logo: 'logos/AMD.svg' },
        { ticker: 'NVDA', name: 'NVIDIA', hl: 'xyz:NVDA', color: '#76B900', logo: 'logos/NVDA.svg' },
        { ticker: 'TSM', name: 'TSMC', hl: 'xyz:TSM', color: '#C4161C', logo: 'logos/TSM.svg', exchange: 'NYSE' },
        { ticker: 'SNDK', name: 'SanDisk', hl: 'xyz:SNDK', color: '#2D4691', logo: 'logos/SNDK.svg' },
        { ticker: 'MU', name: 'Micron', hl: 'xyz:MU', color: '#104076', logo: 'logos/MU.svg' },
        { ticker: 'AVGO', name: 'Broadcom', hl: 'xyz:AVGO', color: '#CC092F', logo: 'logos/AVGO.svg' },
        { ticker: 'SPCX', name: 'SpaceX', hl: 'xyz:SPCX', color: '#4DA8DA', logo: 'logos/SPCX.svg' },
        { ticker: 'MRVL', name: 'Marvell', hl: 'xyz:MRVL', color: '#FFFFFF', logo: 'logos/MRVL.svg' },
        { ticker: 'ARM', name: 'ARM', hl: 'xyz:ARM', color: '#0090BF', logo: 'logos/ARM.svg' },
        { ticker: 'QCOM', name: 'Qualcomm', hl: 'xyz:QCOM', color: '#3253DC', logo: 'logos/QCOM.svg' },
        { ticker: 'MBLY', name: 'Mobileye', hl: null, color: '#1B2CC1', logo: 'logos/MBLY.png' },
        { ticker: '005930.KS', name: 'Samsung', hl: null, color: '#4A6CF7', logo: 'logos/SAMSUNG.svg', currency: 'KRW', displayTicker: 'SMSN' },
        { ticker: '000660.KS', name: 'SK Hynix', hl: null, color: '#E4002B', logo: 'logos/SKHYNIX.svg', currency: 'KRW', displayTicker: 'SKHY' },
    ];

    function sid(s) { return (s.displayTicker || s.ticker).replace(/[^A-Za-z0-9]/g, '_'); }

    let krwToUsd = null;

    async function fetchKrwRate() {
        try {
            const url = `${YAHOO_BASE}USDKRW=X?interval=1d&range=1d`;
            const json = await yahooFetch(url);
            const rate = json.chart.result[0].meta.regularMarketPrice;
            if (rate > 0) krwToUsd = 1 / rate;
        } catch(e) {}
    }

    function fmtPrice(stock, price) {
        if (stock.currency === 'KRW' && krwToUsd) return '$' + (price * krwToUsd).toFixed(2);
        if (stock.currency === 'KRW') return '₩' + Math.round(price).toLocaleString();
        return '$' + price.toFixed(2);
    }

    function toUsd(stock, price) {
        if (stock.currency === 'KRW' && krwToUsd) return price * krwToUsd;
        return price;
    }

    function stockExchange(stock) {
        if (stock.currency === 'KRW') return 'KRX';
        return stock.exchange || 'NASDAQ';
    }

    // State per stock
    const state = {};
    STOCKS.forEach(s => {
        state[s.ticker] = { nasdaqPrice: null, hlPrice: null, prevClose: null, sessionClose: null, prevNasdaq: null, prevHl: null, shares: null, mcap: null, extPrice: null, volume: null, sentiment: 'neutral', currentPct: null };
    });

    // ─── Sentiment Indicator ────────────────────────────────────────────────
    const SENTIMENT_BULL_THRESHOLD = 1.0;
    const SENTIMENT_BEAR_THRESHOLD = -1.0;
    const SENTIMENT_HYSTERESIS = 0.1;

    function computeSentiment(pctChange, currentSentiment) {
        if (currentSentiment === 'bull') {
            if (pctChange < SENTIMENT_BULL_THRESHOLD - SENTIMENT_HYSTERESIS) {
                if (pctChange < SENTIMENT_BEAR_THRESHOLD - SENTIMENT_HYSTERESIS) return 'bear';
                return 'neutral';
            }
            return 'bull';
        } else if (currentSentiment === 'bear') {
            if (pctChange > SENTIMENT_BEAR_THRESHOLD + SENTIMENT_HYSTERESIS) {
                if (pctChange > SENTIMENT_BULL_THRESHOLD + SENTIMENT_HYSTERESIS) return 'bull';
                return 'neutral';
            }
            return 'bear';
        } else {
            // neutral
            if (pctChange > SENTIMENT_BULL_THRESHOLD + SENTIMENT_HYSTERESIS) return 'bull';
            if (pctChange < SENTIMENT_BEAR_THRESHOLD - SENTIMENT_HYSTERESIS) return 'bear';
            return 'neutral';
        }
    }

    // ─── INTC vs AMD Battle Bar ─────────────────────────────────────────────
    // Metric: INTC change% − AMD change%. Positive => Intel favor, negative => AMD favor.
    const BATTLE_CAP = 5; // pp difference at which the bar is fully saturated to one side

    function updateBattleBar() {
        const intcPct = state['INTC'] ? state['INTC'].currentPct : null;
        const amdPct = state['AMD'] ? state['AMD'].currentPct : null;
        if (intcPct == null || amdPct == null) return;

        const diff = intcPct - amdPct;
        const clamped = Math.max(-BATTLE_CAP, Math.min(BATTLE_CAP, diff));
        const intcWidth = 50 + (clamped / BATTLE_CAP) * 50;

        const fillIntc = document.getElementById('battle-fill-intc');
        const fillAmd = document.getElementById('battle-fill-amd');
        if (fillIntc) fillIntc.style.width = intcWidth + '%';
        if (fillAmd) fillAmd.style.width = (100 - intcWidth) + '%';

        const pctIntcEl = document.getElementById('battle-pct-intc');
        const pctAmdEl = document.getElementById('battle-pct-amd');
        if (pctIntcEl) pctIntcEl.textContent = (intcPct >= 0 ? '+' : '') + intcPct.toFixed(2) + '%';
        if (pctAmdEl) pctAmdEl.textContent = (amdPct >= 0 ? '+' : '') + amdPct.toFixed(2) + '%';

        const diffEl = document.getElementById('battle-diff');
        if (diffEl) diffEl.textContent = (diff >= 0 ? '+' : '') + diff.toFixed(2) + 'pp';

        const verdictEl = document.getElementById('battle-verdict');
        if (verdictEl) {
            if (Math.abs(diff) < 0.05) {
                verdictEl.textContent = 'Even';
                verdictEl.className = 'battle-bar-verdict';
            } else if (diff > 0) {
                verdictEl.textContent = `INTC favor (+${diff.toFixed(2)}pp)`;
                verdictEl.className = 'battle-bar-verdict intc';
            } else {
                verdictEl.textContent = `AMD favor (+${(-diff).toFixed(2)}pp)`;
                verdictEl.className = 'battle-bar-verdict amd';
            }
        }
    }

    // ─── Yahoo Finance API ──────────────────────────────────────────────────
    const YAHOO_BASE = 'https://query1.finance.yahoo.com/v8/finance/chart/';
    let proxyMode = 'unknown';

    async function yahooFetch(url) {
        if (proxyMode === 'vercel') return await fetchViaVercel(url);
        if (proxyMode === 'allorigins') return await fetchViaAllorigins(url);
        if (proxyMode === 'direct') { const r = await fetch(url); return r.json(); }

        try { const d = await fetchViaVercel(url); proxyMode = 'vercel'; return d; } catch(e) {}
        try { const r = await fetch(url); if (r.ok) { proxyMode = 'direct'; return r.json(); } } catch(e) {}
        try { const d = await fetchViaAllorigins(url); proxyMode = 'allorigins'; return d; } catch(e) {}
        throw new Error('All sources failed');
    }

    async function fetchViaVercel(url) {
        const params = new URL(url).searchParams;
        const ticker = url.match(/(?:chart|quoteSummary)\/([A-Z0-9.=]+)/i)?.[1] || 'INTC';
        const apiUrl = '/api/yahoo?' + params.toString() + '&symbol=' + encodeURIComponent(ticker);
        const resp = await fetch(apiUrl);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        return resp.json();
    }

    async function fetchViaAllorigins(url) {
        const resp = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url));
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        return resp.json();
    }

    // ─── Time & Market Status ───────────────────────────────────────────────
    function formatDualTime(date) {
        const et = date.toLocaleString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit', hour12: true }) + ' ET';
        return et;
    }

    function getMarketStatus() {
        const now = new Date();
        const etStr = now.toLocaleString('en-US', { timeZone: 'America/New_York', hour12: false });
        const etDate = new Date(etStr);
        const h = etDate.getHours(), m = etDate.getMinutes();
        const mins = h * 60 + m;
        const day = etDate.getDay();
        if (day === 0 || day === 6) return 'closed';
        if (mins >= 240 && mins < 570) return 'premarket';
        if (mins >= 570 && mins < 960) return 'market';
        if (mins >= 960 && mins < 1200) return 'postmarket';
        return 'closed';
    }

    function getKrxMarketStatus() {
        const now = new Date();
        const kstStr = now.toLocaleString('en-US', { timeZone: 'Asia/Seoul', hour12: false });
        const kstDate = new Date(kstStr);
        const h = kstDate.getHours(), m = kstDate.getMinutes();
        const mins = h * 60 + m;
        const day = kstDate.getDay();
        if (day === 0 || day === 6) return 'closed';
        if (mins >= 540 && mins < 930) return 'market'; // 9:00 AM - 3:30 PM KST
        return 'closed';
    }

    // ─── Fetch NASDAQ Data ──────────────────────────────────────────────────
    async function fetchNasdaqForStock(stock) {
        try {
            const url = `${YAHOO_BASE}${stock.ticker}?interval=5m&range=2d&includePrePost=true`;
            const json = await yahooFetch(url);
            const result = json.chart.result[0];
            const meta = result.meta;
            const timestamps = result.timestamp || [];
            const quote = result.indicators.quote[0];

            // Use exchange-appropriate market status
            const ms = stock.currency === 'KRW' ? getKrxMarketStatus() : getMarketStatus();
            const prevClose = meta.previousClose;
            const regPrice = meta.regularMarketPrice;

            // sessionClose: most recent regular session close (reference for extended price changes)
            state[stock.ticker].sessionClose = regPrice || prevClose;
            // prevClose: always meta.previousClose — the official "previous close" per Yahoo
            // This gives the day's % change on cards and in the total market cap.
            state[stock.ticker].prevClose = prevClose;

            // Get trading periods — use tradingPeriods (most recent day in the 2d range) for
            // today's actual boundaries. currentTradingPeriod flips to tomorrow's boundaries
            // once we're past today's post-market close and before tomorrow's pre-market open,
            // which would wrongly hide today's post-market data.
            const todayTP = meta.tradingPeriods;
            const dayIdx = (todayTP && todayTP.regular) ? todayTP.regular.length - 1 : -1;
            const tp = (dayIdx >= 0 && todayTP.regular[dayIdx] && todayTP.regular[dayIdx][0])
                ? {
                    pre: todayTP.pre[dayIdx][0],
                    regular: todayTP.regular[dayIdx][0],
                    post: todayTP.post[dayIdx][0],
                }
                : meta.currentTradingPeriod;

            // Get regular close from candles
            let regularClose = null;
            if (tp) {
                for (let i = timestamps.length - 1; i >= 0; i--) {
                    const t = timestamps[i], c = quote.close[i];
                    if (c != null && t >= tp.regular.start && t < tp.post.start) { regularClose = c; break; }
                }
            }

            // Determine display price
            // Use meta.regularMarketPrice as the official close (includes closing auction)
            // Candle data is only a fallback since the last 5-min bar misses the closing cross
            // KRX has no pre/post market — only 'market' or 'closed'
            let displayPrice, extPrice = null, extLabel = null, refPrice = null;
            if (stock.currency === 'KRW') {
                // Korean stocks: no extended hours
                displayPrice = regPrice || regularClose;
            } else if (ms === 'postmarket' || ms === 'closed') {
                displayPrice = regPrice || regularClose;
                refPrice = displayPrice;
                if (tp) {
                    for (let i = timestamps.length - 1; i >= 0; i--) {
                        const t = timestamps[i], c = quote.close[i];
                        if (c != null && t >= tp.post.start && t < tp.post.end) { extPrice = c; break; }
                    }
                }
                extLabel = 'Post';
            } else if (ms === 'premarket') {
                displayPrice = regPrice || regularClose;
                refPrice = displayPrice;
                if (tp) {
                    for (let i = timestamps.length - 1; i >= 0; i--) {
                        const t = timestamps[i], c = quote.close[i];
                        if (c != null && t >= tp.pre.start && t < tp.regular.start) { extPrice = c; break; }
                    }
                }
                extLabel = 'Pre';
            } else {
                displayPrice = regPrice;
            }

            // Store extended price in state so total mkt cap reflects pre/post movement
            if (extPrice) {
                state[stock.ticker].extPrice = extPrice;
            } else if (ms === 'market') {
                state[stock.ticker].extPrice = null;
            }

            // Update NASDAQ price
            const _sid = sid(stock);
            const priceEl = document.getElementById(`nasdaq-${_sid}`);
            if (displayPrice) {
                const prev = state[stock.ticker].prevNasdaq;
                if (prev !== null && displayPrice !== prev) {
                    priceEl.classList.remove('price-flash-up', 'price-flash-down');
                    void priceEl.offsetWidth;
                    priceEl.classList.add(displayPrice > prev ? 'price-flash-up' : 'price-flash-down');
                }
                state[stock.ticker].prevNasdaq = displayPrice;
                state[stock.ticker].nasdaqPrice = displayPrice;
                priceEl.textContent = fmtPrice(stock, displayPrice);
                updateMarketCap(stock.ticker);

                // Change vs previous close (use corrected prevClose from state)
                const chgEl = document.getElementById(`nasdaq-chg-${_sid}`);
                const refClose = state[stock.ticker].prevClose;
                if (refClose) {
                    const chg = displayPrice - refClose;
                    const pct = (chg / refClose) * 100;
                    const sign = chg >= 0 ? '+' : '';
                    chgEl.innerHTML = `<span class="prev-ref">${fmtPrice(stock, refClose)}</span> <span class="${chg >= 0 ? 'up' : 'down'}">${sign}${pct.toFixed(2)}%</span>`;
                    chgEl.className = `price-block-change`;
                    // Only update sentiment during regular market hours from this path
                    if (ms === 'market') updateSentiment(stock.ticker, pct);
                }
                if (stock.currency === 'KRW') {
                    const krwEl = document.getElementById(`krw-${_sid}`);
                    const krwChgEl = document.getElementById(`krw-chg-${_sid}`);
                    if (krwEl) {
                        krwEl.textContent = '₩' + Math.round(displayPrice).toLocaleString();
                    }
                    if (krwChgEl && refClose) {
                        const chg = displayPrice - refClose;
                        const pct = (chg / refClose) * 100;
                        const sign = chg >= 0 ? '+' : '';
                        krwChgEl.innerHTML = `<span class="prev-ref">₩${Math.round(refClose).toLocaleString()}</span> <span class="${chg >= 0 ? 'up' : 'down'}">${sign}${pct.toFixed(2)}%</span>`;
                        krwChgEl.className = `price-block-change`;
                    }
                }
            }

            // Extended price
            const extEl = document.getElementById(`ext-${_sid}`);
            if (extPrice && refPrice) {
                const extChg = extPrice - refPrice;
                const extPct = (extChg / refPrice) * 100;
                const extSign = extChg >= 0 ? '+' : '';
                const extCls = extChg >= 0 ? 'up' : 'down';
                extEl.innerHTML = `<span class="ext-label">${extLabel}:</span> <span class="ext-value">${fmtPrice(stock, extPrice)}</span> <span class="ext-change ${extCls}">${extSign}${extPct.toFixed(2)}%</span>`;
                // During pre/post market, sentiment reflects extended price movement
                updateSentiment(stock.ticker, extPct);
            } else {
                extEl.innerHTML = '';
            }

            // Volume & OHL: compute from regular-session candles
            // Use meta.regularMarketVolume for official volume (candle sums can differ)
            const metaVolume = meta.regularMarketVolume;
            if (metaVolume) {
                state[stock.ticker].volume = metaVolume;
                displayVolume(stock.ticker, metaVolume);
            }
            if (tp && quote.volume) {
                let totalVol = 0;
                let regOpen = null, regHigh = -Infinity, regLow = Infinity;

                // Try today's regular session first
                for (let i = 0; i < timestamps.length; i++) {
                    const t = timestamps[i], v = quote.volume[i];
                    const o = quote.open[i], h = quote.high[i], l = quote.low[i];
                    if (t >= tp.regular.start && t < tp.post.start) {
                        if (v) totalVol += v;
                        if (regOpen === null && o != null) regOpen = o;
                        if (h != null) regHigh = Math.max(regHigh, h);
                        if (l != null) regLow = Math.min(regLow, l);
                    }
                }

                // If no regular session data for today (pre-market or closed before open),
                // fall back to previous day's regular session from the 2d range
                if (regOpen === null && timestamps.length > 0) {
                    // Previous day's candles are before today's pre-market start
                    const prevDayEnd = tp.pre ? tp.pre.start : tp.regular.start;
                    for (let i = 0; i < timestamps.length; i++) {
                        const t = timestamps[i], v = quote.volume[i];
                        const o = quote.open[i], h = quote.high[i], l = quote.low[i];
                        if (t < prevDayEnd && o != null) {
                            if (v) totalVol += v;
                            if (regOpen === null) regOpen = o;
                            if (h != null) regHigh = Math.max(regHigh, h);
                            if (l != null) regLow = Math.min(regLow, l);
                        }
                    }
                }

                if (!metaVolume && totalVol > 0) {
                    state[stock.ticker].volume = totalVol;
                    displayVolume(stock.ticker, totalVol);
                }
                // Display OHL
                const ohlEl = document.getElementById(`ohl-${_sid}`);
                if (ohlEl && regOpen !== null && regHigh !== -Infinity) {
                    ohlEl.innerHTML = `<span class="ohl-label">O</span><span class="ohl-value">${fmtPrice(stock, regOpen)}</span> · <span class="ohl-label">H</span><span class="ohl-value">${fmtPrice(stock, regHigh)}</span> · <span class="ohl-label">L</span><span class="ohl-value">${fmtPrice(stock, regLow)}</span>`;
                }
            }

        } catch (e) {
            // Silent fail
        }
    }

    async function fetchAllNasdaq() {
        await Promise.allSettled(STOCKS.map(s => fetchNasdaqForStock(s)));
    }

    // ─── Yahoo WebSocket (live prices) ──────────────────────────────────────
    const YahooProto = `
        syntax = "proto3";
        message PricingData {
            string id = 1;
            float price = 2;
            int64 time = 3;
            string exchange = 4;
            string quoteType = 5;
            float changePercent = 8;
            float dayVolume = 9;
            float dayHigh = 10;
            float dayLow = 11;
            float change = 12;
            float previousClose = 15;
            string marketHours = 20;
        }
    `;
    let yahooRoot, YahooPricingData, yahooWs;

    function initYahooProto() {
        yahooRoot = protobuf.parse(YahooProto).root;
        YahooPricingData = yahooRoot.lookupType('PricingData');
    }

    function connectYahooWs() {
        if (yahooWs && yahooWs.readyState === WebSocket.OPEN) return;
        yahooWs = new WebSocket('wss://streamer.finance.yahoo.com/');
        yahooWs.onopen = () => {
            const tickers = STOCKS.map(s => s.ticker);
            yahooWs.send(JSON.stringify({ subscribe: tickers }));
        };
        yahooWs.onmessage = (event) => {
            try {
                const bytes = Uint8Array.from(atob(event.data), c => c.charCodeAt(0));
                const decoded = YahooPricingData.decode(bytes);
                if (decoded.price && decoded.price > 0 && decoded.id) {
                    updateYahooPrice(decoded.id, decoded.price);
                }
            } catch (e) {}
        };
        yahooWs.onclose = () => setTimeout(connectYahooWs, 5000);
        yahooWs.onerror = () => yahooWs.close();
    }

    function updateYahooPrice(ticker, price) {
        const st = state[ticker];
        if (!st) return;
        const stock = STOCKS.find(s => s.ticker === ticker);
        if (!stock) return;

        // Use exchange-appropriate market status
        const ms = stock.currency === 'KRW' ? getKrxMarketStatus() : getMarketStatus();
        if (ms === 'closed') return;

        const _sid = sid(stock);

        // KRX has no pre/post market — only update during regular hours
        if (ms === 'premarket' || ms === 'postmarket') {
            const extEl = document.getElementById(`ext-${_sid}`);
            // Use sessionClose (today's regular close) as reference for extended price change
            const refPrice = st.sessionClose;
            const label = ms === 'premarket' ? 'Pre' : 'Post';
            if (refPrice && extEl) {
                const chg = price - refPrice;
                const pct = (chg / refPrice) * 100;
                const sign = chg >= 0 ? '+' : '';
                const cls = chg >= 0 ? 'up' : 'down';
                extEl.innerHTML = `<span class="ext-label">${label}:</span> <span class="ext-value">${fmtPrice(stock, price)}</span> <span class="ext-change ${cls}">${sign}${pct.toFixed(2)}%</span>`;
                // Sentiment reflects extended price movement during pre/post
                updateSentiment(ticker, pct);
            }
            st.extPrice = price;
            updateMarketCap(ticker);
            return;
        }

        // Regular market — update NASDAQ price
        const priceEl = document.getElementById(`nasdaq-${_sid}`);
        if (!priceEl) return;
        const prev = st.prevNasdaq;
        if (prev !== null && price !== prev) {
            priceEl.classList.remove('price-flash-up', 'price-flash-down');
            void priceEl.offsetWidth;
            priceEl.classList.add(price > prev ? 'price-flash-up' : 'price-flash-down');
        }
        st.prevNasdaq = price;
        st.extPrice = null;
        priceEl.textContent = fmtPrice(stock, price);
        updateMarketCap(ticker);

        const chgEl = document.getElementById(`nasdaq-chg-${_sid}`);
        // Always use prevClose (yesterday's close from chart API) for main change display
        const prevClose = st.prevClose;
        if (prevClose && chgEl) {
            const chg = price - prevClose;
            const pct = (chg / prevClose) * 100;
            const sign = chg >= 0 ? '+' : '';
            chgEl.innerHTML = `<span class="prev-ref">${fmtPrice(stock, prevClose)}</span> <span class="${chg >= 0 ? 'up' : 'down'}">${sign}${pct.toFixed(2)}%</span>`;
            chgEl.className = `price-block-change`;
            updateSentiment(ticker, pct);
        }
        if (stock.currency === 'KRW') {
            const krwEl = document.getElementById(`krw-${_sid}`);
            const krwChgEl = document.getElementById(`krw-chg-${_sid}`);
            if (krwEl) {
                krwEl.textContent = '₩' + Math.round(price).toLocaleString();
            }
            if (krwChgEl && prevClose) {
                const chg = price - prevClose;
                const pct = (chg / prevClose) * 100;
                const sign = chg >= 0 ? '+' : '';
                krwChgEl.innerHTML = `<span class="prev-ref">₩${Math.round(prevClose).toLocaleString()}</span> <span class="${chg >= 0 ? 'up' : 'down'}">${sign}${pct.toFixed(2)}%</span>`;
                krwChgEl.className = `price-block-change`;
            }
        }
    }

    // ─── Hyperliquid WebSocket ──────────────────────────────────────────────
    let hlWs;

    function connectHlWs() {
        if (hlWs && hlWs.readyState === WebSocket.OPEN) return;
        hlWs = new WebSocket('wss://api.hyperliquid.xyz/ws');
        hlWs.onopen = () => {
            STOCKS.filter(s => s.hl).forEach(s => {
                hlWs.send(JSON.stringify({
                    method: 'subscribe',
                    subscription: { type: 'l2Book', coin: s.hl }
                }));
            });
        };
        hlWs.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.channel === 'l2Book' && msg.data) {
                    const coin = msg.data.coin;
                    const stock = STOCKS.find(s => s.hl === coin);
                    if (!stock) return;
                    const levels = msg.data.levels;
                    if (levels && levels[0] && levels[1] && levels[0].length && levels[1].length) {
                        const bid = parseFloat(levels[0][0].px);
                        const ask = parseFloat(levels[1][0].px);
                        const mid = (bid + ask) / 2;
                        updateHlPrice(stock.ticker, mid);
                    }
                }
            } catch (e) {}
        };
        hlWs.onclose = () => setTimeout(connectHlWs, 3000);
        hlWs.onerror = () => hlWs.close();
    }

    function updateHlPrice(ticker, price) {
        const stock = STOCKS.find(s => s.ticker === ticker);
        if (!stock) return;
        const _sid = sid(stock);
        const priceEl = document.getElementById(`hl-${_sid}`);
        if (!priceEl) return;

        const st = state[ticker];
        const prev = st.prevHl;
        if (prev !== null && price !== prev) {
            priceEl.classList.remove('price-flash-up', 'price-flash-down');
            void priceEl.offsetWidth;
            priceEl.classList.add(price > prev ? 'price-flash-up' : 'price-flash-down');
        }
        st.prevHl = price;
        priceEl.textContent = `$${price.toFixed(2)}`;

        const chgEl = document.getElementById(`hl-chg-${_sid}`);
        // During market hours: HL references yesterday's close (same as NASDAQ)
        // After close: HL references today's session close (that day is done)
        const ms = getMarketStatus();
        const refClose = (ms === 'market') ? st.prevClose : (st.sessionClose || st.prevClose);
        if (refClose && chgEl) {
            const refUsd = stock ? toUsd(stock, refClose) : refClose;
            const chg = price - refUsd;
            const pct = (chg / refUsd) * 100;
            const sign = chg >= 0 ? '+' : '';
            chgEl.textContent = `${sign}${pct.toFixed(2)}%`;
            chgEl.className = `price-block-change ${chg >= 0 ? 'up' : 'down'}`;
        }
    }

    // ─── Fetch Shares Outstanding ────────────────────────────────────────────
    async function fetchAllShares() {
        await Promise.allSettled(STOCKS.map(async (stock) => {
            try {
                const url = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${stock.ticker}?modules=defaultKeyStatistics,summaryDetail`;
                const json = await yahooFetch(url);
                const result = json.quoteSummary?.result?.[0];
                const mcapRaw = result?.summaryDetail?.marketCap?.raw;
                const shares = result?.defaultKeyStatistics?.sharesOutstanding?.raw;
                if (shares) {
                    state[stock.ticker].shares = shares;
                    updateMarketCap(stock.ticker);
                } else if (mcapRaw && state[stock.ticker].nasdaqPrice) {
                    // Fallback: derive shares from Yahoo's market cap when sharesOutstanding unavailable
                    state[stock.ticker].shares = mcapRaw / state[stock.ticker].nasdaqPrice;
                    updateMarketCap(stock.ticker);
                } else if (mcapRaw) {
                    state[stock.ticker].mcap = mcapRaw;
                    displayMarketCap(stock.ticker, mcapRaw);
                }
                // Average volume
                const avgVol = result?.summaryDetail?.averageVolume?.raw;
                if (avgVol) displayAvgVolume(stock.ticker, avgVol);
            } catch(e) {}
        }));
    }

    function formatVolume(v) {
        if (v >= 1e9) return `${(v/1e9).toFixed(1)}B`;
        if (v >= 1e6) return `${(v/1e6).toFixed(1)}M`;
        if (v >= 1e3) return `${(v/1e3).toFixed(0)}K`;
        return v.toFixed(0);
    }

    function displayVolume(ticker, vol) {
        const stock = STOCKS.find(s => s.ticker === ticker);
        const _sid = stock ? sid(stock) : ticker;
        const el = document.getElementById(`vol-${_sid}`);
        const metaEl = document.getElementById(`meta-${_sid}`);
        if (!el || !metaEl) return;
        el.textContent = `Vol: ${formatVolume(vol)}`;
        metaEl.classList.add('has-volume');
    }

    function displayAvgVolume(ticker, avgVol) {
        const stock = STOCKS.find(s => s.ticker === ticker);
        const _sid = stock ? sid(stock) : ticker;
        const el = document.getElementById(`avgvol-${_sid}`);
        if (!el) return;
        el.textContent = `Avg Vol: ${formatVolume(avgVol)}`;
    }

    function hideAllVolumes() {
        STOCKS.forEach(s => {
            const _sid = sid(s);
            const el = document.getElementById(`vol-${_sid}`);
            const metaEl = document.getElementById(`meta-${_sid}`);
            if (el) el.textContent = '';
            if (metaEl) metaEl.classList.remove('has-volume');
        });
    }

    function displayMarketCap(ticker, mcap) {
        const stock = STOCKS.find(s => s.ticker === ticker);
        const _sid = stock ? sid(stock) : ticker;
        const el = document.getElementById(`mcap-${_sid}`);
        if (!el) return;
        let mcapUsd = mcap;
        if (stock && stock.currency === 'KRW' && krwToUsd) mcapUsd = mcap * krwToUsd;
        if (mcapUsd >= 1e12) el.textContent = `Mkt Cap: $${(mcapUsd/1e12).toFixed(1)}T`;
        else if (mcapUsd >= 1e9) el.textContent = `Mkt Cap: $${(mcapUsd/1e9).toFixed(1)}B`;
        else el.textContent = `Mkt Cap: $${(mcapUsd/1e6).toFixed(0)}M`;
    }

    function updateMarketCap(ticker) {
        const st = state[ticker];
        const stock = STOCKS.find(s => s.ticker === ticker);
        // Market cap tracks only regular session price (not extended)
        const ms = stock && stock.currency === 'KRW' ? getKrxMarketStatus() : getMarketStatus();
        let price;
        if (ms === 'market') {
            price = st.prevNasdaq || st.nasdaqPrice;
        } else {
            price = st.sessionClose || st.prevNasdaq || st.nasdaqPrice;
        }
        if (!st.shares || !price) return;
        const mcap = price * st.shares;
        st.mcap = mcap;
        displayMarketCap(ticker, mcap);
        updateTotalMarketCap();
    }

    // ─── Total Market Cap Aggregation ────────────────────────────────────────
    function updateTotalMarketCap() {
        const usStocks = STOCKS.filter(s => !s.currency);
        const krStocks = STOCKS.filter(s => s.currency === 'KRW');
        computeSectionMcap(usStocks, 'us');
        computeSectionMcap(krStocks, 'kr');
    }

    function computeSectionMcap(stocks, section) {
        let totalCurrent = 0, totalPrev = 0;
        let hasAny = false;
        for (const stock of stocks) {
            const st = state[stock.ticker];
            if (!st.shares) continue;
            // Market cap tracks only open market movement (not pre/post)
            const ms = stock.currency === 'KRW' ? getKrxMarketStatus() : getMarketStatus();
            let price, prevPrice;
            if (ms === 'market') {
                // During market: current live price vs previous day's close
                price = st.prevNasdaq || st.nasdaqPrice;
                prevPrice = st.prevClose;
            } else {
                // Pre/post/closed: today's session close vs previous day's close
                price = st.sessionClose || st.prevNasdaq || st.nasdaqPrice;
                prevPrice = st.prevClose;
            }
            if (!price || !prevPrice) continue;
            hasAny = true;
            let mcapCurrent = price * st.shares;
            let mcapPrev = prevPrice * st.shares;
            if (stock.currency === 'KRW' && krwToUsd) {
                mcapCurrent *= krwToUsd;
                mcapPrev *= krwToUsd;
            }
            totalCurrent += mcapCurrent;
            totalPrev += mcapPrev;
        }
        if (!hasAny) return;
        const valEl = document.getElementById(`mcap-total-${section}`);
        const chgEl = document.getElementById(`mcap-chg-${section}`);
        if (!valEl || !chgEl) return;
        valEl.textContent = formatLargeCurrency(totalCurrent);
        if (totalPrev > 0) {
            const pctChg = ((totalCurrent - totalPrev) / totalPrev) * 100;
            const sign = pctChg >= 0 ? '+' : '';
            chgEl.innerHTML = `<span class="mcap-prev-ref">Last Close: ${formatLargeCurrency(totalPrev)}</span> <span class="${pctChg >= 0 ? 'up' : 'down'}">${sign}${pctChg.toFixed(2)}%</span>`;
            chgEl.className = `mcap-summary-change`;
        }
    }

    function formatLargeCurrency(val) {
        if (val >= 1e12) return `$${(val / 1e12).toFixed(2)}T`;
        if (val >= 1e9) return `$${(val / 1e9).toFixed(1)}B`;
        return `$${(val / 1e6).toFixed(0)}M`;
    }

    // ─── 52-Week High ───────────────────────────────────────────────────────
    async function fetchATHForStock(stock) {
        try {
            const url = `${YAHOO_BASE}${stock.ticker}?interval=1d&range=1y`;
            const json = await yahooFetch(url);
            const result = json.chart.result[0];
            const quote = result.indicators.quote[0];
            const timestamps = result.timestamp || [];

            let highClose = -Infinity, highTrade = -Infinity;
            let highCloseDate = null, highTradeDate = null;
            let lowClose = Infinity, lowTrade = Infinity;
            let lowCloseDate = null, lowTradeDate = null;

            // Exclude today's data point for close if market is still open (close is just live price)
            const ms = stock.currency === 'KRW' ? getKrxMarketStatus() : getMarketStatus();
            const marketOpen = (ms === 'market' || ms === 'premarket');
            const closeLimit = (marketOpen && timestamps.length > 1) ? timestamps.length - 1 : timestamps.length;
            for (let i = 0; i < closeLimit; i++) {
                const c = quote.close[i];
                if (c != null && c > highClose) { highClose = c; highCloseDate = timestamps[i]; }
                if (c != null && c < lowClose) { lowClose = c; lowCloseDate = timestamps[i]; }
            }
            for (let i = 0; i < timestamps.length; i++) {
                const h = quote.high[i];
                const l = quote.low[i];
                if (h != null && h > highTrade) { highTrade = h; highTradeDate = timestamps[i]; }
                if (l != null && l < lowTrade) { lowTrade = l; lowTradeDate = timestamps[i]; }
            }

            if (highClose <= 0) return;

            const _sid = sid(stock);
            const athEl = document.getElementById(`ath-${_sid}`);
            if (!athEl) return;

            const fmtDate = (ts) => { const d = new Date(ts * 1000); const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`; };
            const fmtP = (p) => stock.currency === 'KRW' ? '₩' + Math.round(p).toLocaleString() : '$' + p.toFixed(2);
            const curPrice = state[stock.ticker].nasdaqPrice;
            const pctFromHigh = curPrice ? ((curPrice - highClose) / highClose * 100).toFixed(1) : null;
            const pctFromHighTrade = curPrice ? ((curPrice - highTrade) / highTrade * 100).toFixed(1) : null;
            const pctFromLow = curPrice ? ((curPrice - lowClose) / lowClose * 100).toFixed(1) : null;
            const pctFromLowTrade = curPrice ? ((curPrice - lowTrade) / lowTrade * 100).toFixed(1) : null;
            const pctHtml = (pct) => pct !== null ? ` <span class="ath-pct">(${Number(pct) >= 0 ? '+' : ''}${pct}%)</span>` : '';
            athEl.innerHTML =
                `<span class="ath-label">52W High Close:</span> <span class="ath-value">${fmtP(highClose)}</span> (${fmtDate(highCloseDate)})${pctHtml(pctFromHigh)}<br>` +
                `<span class="ath-label">52W High Trade:</span> <span class="ath-value">${fmtP(highTrade)}</span> (${fmtDate(highTradeDate)})${pctHtml(pctFromHighTrade)}` +
                `<hr class="ath-divider">` +
                `<span class="ath-label">52W Low Close:</span> <span class="ath-value">${fmtP(lowClose)}</span> (${fmtDate(lowCloseDate)})${pctHtml(pctFromLow)}<br>` +
                `<span class="ath-label">52W Low Trade:</span> <span class="ath-value">${fmtP(lowTrade)}</span> (${fmtDate(lowTradeDate)})${pctHtml(pctFromLowTrade)}`;
        } catch (e) {}
    }

    async function fetchAllATH() {
        await Promise.allSettled(STOCKS.map(s => fetchATHForStock(s)));
    }

    // ─── Init ───────────────────────────────────────────────────────────────
    async function init() {
        renderGrid();
        initYahooProto();
        connectYahooWs();
        connectHlWs();
        await fetchKrwRate();
        fetchAllNasdaq().then(() => {
            fetchAllShares();
            fetchAllATH();
        });

        // Time update
        function updateETClock() {
            const el = document.getElementById('et-clock');
            if (el) el.textContent = formatDualTime(new Date());
        }
        setInterval(() => {
            updateETClock();
            updateHlDimState();
            updateSentimentVisibility();
        }, 60000);
        updateETClock();
        updateHlDimState();
        updateSentimentVisibility();

        // Refresh NASDAQ data every 60s
        setInterval(fetchAllNasdaq, 60000);

        // Refresh KRX stocks more frequently (every 15s) during KRX hours
        setInterval(() => {
            if (getKrxMarketStatus() === 'market') {
                STOCKS.filter(s => s.currency === 'KRW').forEach(s => fetchNasdaqForStock(s));
            }
        }, 15000);
    }

    function updateHlDimState() {
        const usMs = getMarketStatus();
        const krMs = getKrxMarketStatus();

        // HL: dim during market/pre/post, bright when closed
        const hlDim = (usMs !== 'closed');
        document.querySelectorAll('.hl-block').forEach(el => {
            el.classList.toggle('hl-dimmed', hlDim);
        });

        // Per-card dimming based on exchange
        STOCKS.forEach(s => {
            const _sid = sid(s);
            const card = document.getElementById(`card-${_sid}`);
            if (!card) return;
            const nasBl = card.querySelector('.nasdaq-block');
            const extEl = document.getElementById(`ext-${_sid}`);

            if (s.currency === 'KRW') {
                // KRX stocks: bright during KRX market hours
                const dim = (krMs !== 'market');
                if (nasBl) nasBl.classList.toggle('nasdaq-dimmed', dim);
                const krwBl = card.querySelector('.krw-block');
                if (krwBl) krwBl.classList.toggle('krw-dimmed', dim);
                if (extEl) extEl.classList.toggle('ext-dimmed', true); // no extended hours for KRX
                const ohlEl = document.getElementById(`ohl-${_sid}`);
                if (ohlEl) ohlEl.classList.toggle('ohl-dimmed', dim);
            } else {
                // US stocks
                const nasDim = (usMs !== 'market');
                if (nasBl) nasBl.classList.toggle('nasdaq-dimmed', nasDim);
                const extDim = (usMs === 'closed' || usMs === 'market');
                if (extEl) extEl.classList.toggle('ext-dimmed', extDim);
                const ohlEl = document.getElementById(`ohl-${_sid}`);
                if (ohlEl) ohlEl.classList.toggle('ohl-dimmed', nasDim);
            }
        });
    }

    document.addEventListener('DOMContentLoaded', init);
    </script>
